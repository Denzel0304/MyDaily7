<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0820">
<title>N멍</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #app {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    touch-action: none;
    overflow: hidden;
  }

  canvas#c {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }

  /* ── Top bar ── */
  #top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: max(env(safe-area-inset-top, 16px), 16px) 20px 0;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 30;
    pointer-events: none;
  }

  #app-icon {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  #app-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 300;
    color: rgba(255,255,255,0.92);
    letter-spacing: 2px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  /* ── Scene label ── */
  #scene-label {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 58px);
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: rgba(255,255,255,0.65);
    letter-spacing: 2.5px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    white-space: nowrap;
    z-index: 30;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  /* ── Dots ── */
  #dots {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 34px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 7px;
    align-items: center;
    z-index: 30;
    pointer-events: none;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: all 0.45s cubic-bezier(0.34,1.56,0.64,1);
  }
  .dot.active {
    width: 20px;
    border-radius: 3px;
    background: rgba(255,255,255,0.82);
  }

  /* ── Arrow buttons ── */
  .arrow-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 0.5px solid rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 30;
    transition: background 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .arrow-btn:active {
    background: rgba(255,255,255,0.25);
    transform: translateY(-50%) scale(0.93);
  }

  #btn-left  { left: 14px; }
  #btn-right { right: 14px; }

  /* ── Transition overlay ── */
  #fade {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.32s ease;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="c"></canvas>
  <div id="fade"></div>

  <!-- Top bar -->
  <div id="top-bar">
    <div id="app-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- leaf / droplet icon -->
        <path d="M12 2C7.5 2 4 6.5 4 11C4 16 8 20 12 22C16 20 20 16 20 11C20 6.5 16.5 2 12 2Z"
              fill="rgba(255,255,255,0.75)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
        <path d="M12 8V16M9 12.5C9 12.5 10.5 14 12 14C13.5 14 15 12.5 15 12.5"
              stroke="rgba(255,255,255,0.45)" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>
    <span id="app-name">N멍</span>
  </div>

  <!-- Scene label -->
  <div id="scene-label">봄 나무</div>

  <!-- Dots -->
  <div id="dots"></div>

  <!-- Arrow buttons -->
  <button class="arrow-btn" id="btn-left" aria-label="이전 장면">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M11 4L6 9L11 14" stroke="rgba(255,255,255,0.88)" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="arrow-btn" id="btn-right" aria-label="다음 장면">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M7 4L12 9L7 14" stroke="rgba(255,255,255,0.88)" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const fade   = document.getElementById('fade');
const labelEl= document.getElementById('scene-label');
const dotsEl = document.getElementById('dots');

let W, H, dpr = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  initScene();
}
window.addEventListener('resize', resize);

// ──────────────────────────────────────────────
// Scenes registry
// ──────────────────────────────────────────────
const scenes = [
  { name: '봄 나무',     id: 'spring_tree'    },
  { name: '별똥별',      id: 'shooting_stars' },
  { name: '눈 내리는 밤', id: 'snowfall'       },
  { name: '시냇물',      id: 'stream'         },
  { name: '가을 낙엽',   id: 'autumn'         },
  { name: '연못의 잉어', id: 'koi_pond'       },
];

let currentIdx = 0;
let particles  = [];
let extras     = [];   // bg objects (ripples, shooters)
let animId;
let t = 0;

// ──────────────────────────────────────────────
// UI helpers
// ──────────────────────────────────────────────
function buildDots() {
  dotsEl.innerHTML = '';
  scenes.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentIdx ? ' active' : '');
    dotsEl.appendChild(d);
  });
}

function updateUI() {
  labelEl.textContent = scenes[currentIdx].name;
  buildDots();
}

// ──────────────────────────────────────────────
// Scene transition
// ──────────────────────────────────────────────
function changeScene(dir) {
  fade.style.opacity = '1';
  setTimeout(() => {
    currentIdx = (currentIdx + dir + scenes.length) % scenes.length;
    updateUI();
    initScene();
    fade.style.opacity = '0';
  }, 320);
}

document.getElementById('btn-left').addEventListener('click',  () => changeScene(-1));
document.getElementById('btn-right').addEventListener('click', () => changeScene(1));

// Swipe
let touchX0 = null, touchY0 = null;
document.getElementById('app').addEventListener('touchstart', e => {
  touchX0 = e.touches[0].clientX;
  touchY0 = e.touches[0].clientY;
}, { passive: true });

document.getElementById('app').addEventListener('touchend', e => {
  if (touchX0 === null) return;
  const dx = e.changedTouches[0].clientX - touchX0;
  const dy = e.changedTouches[0].clientY - touchY0;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 48) {
    changeScene(dx < 0 ? 1 : -1);
  }
  touchX0 = touchY0 = null;
}, { passive: true });

// Block vertical scroll / pull
document.getElementById('app').addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ──────────────────────────────────────────────
// Scene init dispatcher
// ──────────────────────────────────────────────
function initScene() {
  particles = []; extras = []; t = 0;
  cancelAnimationFrame(animId);
  const id = scenes[currentIdx].id;
  if (id === 'spring_tree')    initSpringTree();
  else if (id === 'shooting_stars') initShootingStars();
  else if (id === 'snowfall')  initSnowfall();
  else if (id === 'stream')    initStream();
  else if (id === 'autumn')    initAutumn();
  else if (id === 'koi_pond')  initKoiPond();
  loop();
}

// ══════════════════════════════════════════════
// SCENE 1 · 봄 나무  Spring Tree
// ══════════════════════════════════════════════
function initSpringTree() {
  for (let i = 0; i < 42; i++) particles.push(makeLeaf(true));
}

function makeLeaf(scatter) {
  return {
    type: 'leaf',
    x: W * 0.12 + Math.random() * W * 0.76,
    y: scatter ? Math.random() * H : -15,
    vx: (Math.random() - 0.5) * 0.55,
    vy: 0.28 + Math.random() * 0.72,
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.045,
    size: 5 + Math.random() * 7,
    alpha: 0.72 + Math.random() * 0.28,
    swg: Math.random() * Math.PI * 2,
    swgS: 0.018 + Math.random() * 0.022,
    hue: 92 + Math.random() * 38,
  };
}

function drawSpringTree() {
  // sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#bde8a8');
  sky.addColorStop(0.5, '#d8f0c8');
  sky.addColorStop(1,   '#e8f5d8');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // distant soft hills
  ctx.fillStyle = 'rgba(172,215,142,0.38)';
  ctx.beginPath(); ctx.ellipse(W*0.12, H*0.73, W*0.36, H*0.13, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(155,205,125,0.28)';
  ctx.beginPath(); ctx.ellipse(W*0.88, H*0.76, W*0.32, H*0.11, 0, 0, Math.PI*2); ctx.fill();

  // ground
  const gr = ctx.createLinearGradient(0, H*0.78, 0, H);
  gr.addColorStop(0, 'rgba(130,185,95,0.7)');
  gr.addColorStop(1, 'rgba(100,155,65,0.9)');
  ctx.fillStyle = gr; ctx.fillRect(0, H*0.8, W, H*0.2);

  const tx = W * 0.5, ty = H * 0.82;

  // trunk
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = '#7a5c3a'; ctx.lineWidth = 13;
  ctx.beginPath(); ctx.moveTo(tx, ty);
  ctx.bezierCurveTo(tx-8, ty-H*0.12, tx+6, ty-H*0.24, tx, ty-H*0.33); ctx.stroke();

  // branches
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(tx, ty-H*0.19); ctx.quadraticCurveTo(tx+48, ty-H*0.24, tx+62, ty-H*0.22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx, ty-H*0.24); ctx.quadraticCurveTo(tx-42, ty-H*0.30, tx-58, ty-H*0.28); ctx.stroke();
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(tx+40, ty-H*0.23); ctx.quadraticCurveTo(tx+55, ty-H*0.30, tx+52, ty-H*0.35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx-36, ty-H*0.28); ctx.quadraticCurveTo(tx-48, ty-H*0.34, tx-44, ty-H*0.39); ctx.stroke();

  // canopy blobs — soft layered circles
  const blobs = [
    [tx,    ty-H*0.50, 88, 0.58],
    [tx-64, ty-H*0.40, 72, 0.54],
    [tx+58, ty-H*0.41, 68, 0.52],
    [tx-28, ty-H*0.57, 62, 0.50],
    [tx+30, ty-H*0.55, 65, 0.50],
    [tx,    ty-H*0.62, 52, 0.46],
  ];
  blobs.forEach(([bx, by, r, a]) => {
    ctx.globalAlpha = a;
    ctx.fillStyle = `hsl(108,55%,52%)`;
    ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `hsl(100,50%,62%)`;
    ctx.beginPath(); ctx.arc(bx - r*0.18, by - r*0.22, r*0.58, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // cherry blossom puffs
  for (let i = 0; i < 14; i++) {
    const ang = (i / 14) * Math.PI * 2;
    const r2 = 48 + Math.sin(t * 0.6 + i) * 8;
    const px = tx + Math.cos(ang) * r2 * 0.9;
    const py = ty - H*0.50 + Math.sin(ang) * r2 * 0.55;
    ctx.globalAlpha = 0.45 + Math.sin(t*0.8 + i)*0.1;
    ctx.fillStyle = `hsl(340,70%,88%)`;
    ctx.beginPath(); ctx.arc(px, py, 5 + Math.sin(i)*1.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawLeaf(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  ctx.globalAlpha = p.alpha;
  ctx.fillStyle = `hsl(${p.hue},58%,46%)`;
  ctx.beginPath();
  ctx.moveTo(0, -p.size);
  ctx.bezierCurveTo(p.size*0.9, -p.size*0.4, p.size*0.7, p.size*0.5, 0, p.size*0.9);
  ctx.bezierCurveTo(-p.size*0.7, p.size*0.5, -p.size*0.9, -p.size*0.4, 0, -p.size);
  ctx.fill();
  // midrib
  ctx.strokeStyle = `hsla(${p.hue+15},50%,34%,0.5)`;
  ctx.lineWidth = 0.7;
  ctx.beginPath(); ctx.moveTo(0,-p.size*0.85); ctx.lineTo(0,p.size*0.8); ctx.stroke();
  ctx.restore();
}

function updateLeaf(p) {
  p.swg += p.swgS;
  p.x += p.vx + Math.sin(p.swg) * 0.85;
  p.y += p.vy;
  p.rot += p.rotV;
  if (p.y > H + 20) { Object.assign(p, makeLeaf(false)); }
}

// ══════════════════════════════════════════════
// SCENE 2 · 별똥별  Shooting Stars
// ══════════════════════════════════════════════
function initShootingStars() {
  for (let i = 0; i < 130; i++) particles.push(makeStar());
  spawnShooter();
}

function makeStar() {
  return {
    type: 'star',
    x: Math.random() * W,
    y: Math.random() * H * 0.88,
    r: 0.3 + Math.random() * 1.3,
    a: 0.25 + Math.random() * 0.75,
    twk: Math.random() * Math.PI * 2,
    twkS: 0.008 + Math.random() * 0.028,
  };
}

function spawnShooter() {
  extras.push({
    type: 'shooter',
    x: W * 0.05 + Math.random() * W * 0.65,
    y: Math.random() * H * 0.42,
    vx: 3.5 + Math.random() * 4.5,
    vy: 1.8 + Math.random() * 3.0,
    len: 55 + Math.random() * 90,
    life: 0,
    maxLife: 55 + Math.random() * 45,
    alpha: 1,
  });
}

function drawNightSky() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#080620');
  sky.addColorStop(0.45,'#100e38');
  sky.addColorStop(1,   '#181658');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // milky way soft haze
  ctx.save();
  ctx.globalAlpha = 0.06;
  const mw = ctx.createRadialGradient(W*0.5, H*0.32, 0, W*0.5, H*0.32, W*0.7);
  mw.addColorStop(0, '#c8b8ee');
  mw.addColorStop(1, 'transparent');
  ctx.fillStyle = mw;
  ctx.beginPath(); ctx.ellipse(W*0.5, H*0.32, W*0.72, H*0.22, -0.28, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // moon
  ctx.save();
  ctx.globalAlpha = 0.92;
  const moonGlow = ctx.createRadialGradient(W*0.82, H*0.10, 0, W*0.82, H*0.10, 55);
  moonGlow.addColorStop(0,   'rgba(255,248,215,0.35)');
  moonGlow.addColorStop(0.5, 'rgba(255,248,215,0.08)');
  moonGlow.addColorStop(1,   'transparent');
  ctx.fillStyle = moonGlow;
  ctx.beginPath(); ctx.arc(W*0.82, H*0.10, 55, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff9d8';
  ctx.beginPath(); ctx.arc(W*0.82, H*0.10, 26, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // silhouette hills
  ctx.fillStyle = 'rgba(5,4,20,0.96)';
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.bezierCurveTo(W*0.1, H*0.84, W*0.22, H*0.80, W*0.32, H*0.86);
  ctx.bezierCurveTo(W*0.42, H*0.92, W*0.52, H*0.78, W*0.64, H*0.84);
  ctx.bezierCurveTo(W*0.76, H*0.90, W*0.88, H*0.82, W, H*0.87);
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
}

// ══════════════════════════════════════════════
// SCENE 3 · 눈 내리는 밤  Snowfall
// ══════════════════════════════════════════════
function initSnowfall() {
  for (let i = 0; i < 100; i++) particles.push(makeSnow(true));
}

function makeSnow(scatter) {
  return {
    type: 'snow',
    x: Math.random() * W,
    y: scatter ? Math.random() * H : -8,
    r: 1.4 + Math.random() * 3.8,
    vx: (Math.random() - 0.5) * 0.38,
    vy: 0.35 + Math.random() * 0.75,
    a: 0.45 + Math.random() * 0.55,
    swg: Math.random() * Math.PI * 2,
    swgS: 0.006 + Math.random() * 0.014,
  };
}

function drawSnowScene() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#141e2e');
  sky.addColorStop(0.55, '#1e2c48');
  sky.addColorStop(1, '#2a3a5e');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // far blue-white hills
  ctx.fillStyle = 'rgba(180,200,220,0.18)';
  ctx.beginPath(); ctx.ellipse(W*0.25, H*0.72, W*0.38, H*0.10, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(160,185,210,0.14)';
  ctx.beginPath(); ctx.ellipse(W*0.78, H*0.75, W*0.34, H*0.09, 0, 0, Math.PI*2); ctx.fill();

  // snow ground
  const gd = ctx.createLinearGradient(0, H*0.82, 0, H);
  gd.addColorStop(0, '#d8e4ee');
  gd.addColorStop(1, '#e8f0f8');
  ctx.fillStyle = gd;
  ctx.beginPath();
  ctx.moveTo(0, H*0.84);
  ctx.bezierCurveTo(W*0.2, H*0.81, W*0.4, H*0.83, W*0.6, H*0.82);
  ctx.bezierCurveTo(W*0.8, H*0.81, W*0.9, H*0.84, W, H*0.83);
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();

  // pine trees
  const pines = [[W*0.18, H*0.83, 0.75], [W*0.50, H*0.83, 0.95], [W*0.80, H*0.82, 0.82]];
  pines.forEach(([px, py, s]) => {
    // trunk
    ctx.strokeStyle = '#5a3a22'; ctx.lineWidth = 5*s; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py-H*0.06*s); ctx.stroke();
    // tiers
    const tiers = [
      [py, 24*s, 1.35*s],
      [py-H*0.075*s, 20*s, 1.25*s],
      [py-H*0.145*s, 15*s, 1.15*s],
      [py-H*0.205*s, 10*s, 1.05*s],
    ];
    tiers.forEach(([ty2, r, h]) => {
      ctx.fillStyle = 'rgba(35,65,50,0.82)';
      ctx.beginPath();
      ctx.moveTo(px, ty2 - r*h);
      ctx.lineTo(px - r, ty2);
      ctx.lineTo(px + r, ty2);
      ctx.closePath(); ctx.fill();
      // snow on tier
      ctx.fillStyle = 'rgba(225,238,248,0.75)';
      ctx.beginPath(); ctx.ellipse(px, ty2 - r*h + 3, r*0.6, r*0.22, 0, 0, Math.PI*2); ctx.fill();
    });
  });
}

// ══════════════════════════════════════════════
// SCENE 4 · 시냇물  Stream
// ══════════════════════════════════════════════
function initStream() {
  for (let i = 0; i < 10; i++) extras.push(makeRipple(true));
  for (let i = 0; i < 18; i++) particles.push(makeBubble(true));
}

function makeRipple(scatter) {
  return {
    type: 'ripple',
    x: W*0.08 + Math.random() * W*0.84,
    y: H*0.50 + Math.random() * H*0.34,
    r: 0,
    maxR: 20 + Math.random() * 36,
    a: 0.55,
    life: scatter ? Math.random() * 70 : 0,
    maxLife: 65 + Math.random() * 45,
  };
}

function makeBubble(scatter) {
  return {
    type: 'bubble',
    x: W*0.06 + Math.random() * W*0.88,
    y: scatter ? H*0.48 + Math.random()*H*0.38 : H*0.88,
    r: 1.8 + Math.random() * 4.5,
    vy: -(0.28 + Math.random() * 0.55),
    vx: (Math.random() - 0.5) * 0.3,
    a: 0.35 + Math.random() * 0.35,
  };
}

function drawStreamScene() {
  // bank gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,   '#a8cc90');
  bg.addColorStop(0.3, '#bcd898');
  bg.addColorStop(0.48,'#b0d090');
  bg.addColorStop(1,   '#4e9898');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // top bank greenery
  ctx.fillStyle = 'rgba(108,152,72,0.55)';
  ctx.beginPath();
  ctx.moveTo(0, H*0.5);
  ctx.bezierCurveTo(W*0.25, H*0.46, W*0.5, H*0.50, W*0.75, H*0.47);
  ctx.bezierCurveTo(W*0.88, H*0.45, W, H*0.49, W, 0);
  ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();

  // bottom bank
  ctx.fillStyle = 'rgba(90,135,55,0.50)';
  ctx.beginPath();
  ctx.moveTo(0, H*0.6);
  ctx.bezierCurveTo(W*0.3, H*0.57, W*0.6, H*0.60, W*0.85, H*0.58);
  ctx.bezierCurveTo(W*0.93, H*0.57, W, H*0.60, W, H);
  ctx.lineTo(0, H); ctx.closePath(); ctx.fill();

  // water body
  const wg = ctx.createLinearGradient(0, H*0.48, 0, H*0.62);
  wg.addColorStop(0, 'rgba(88,172,195,0.88)');
  wg.addColorStop(1, 'rgba(55,138,168,0.92)');
  ctx.fillStyle = wg;
  ctx.beginPath();
  for (let i = 0; i <= 24; i++) {
    const wx = (i/24)*W;
    const wy = H*0.50 + Math.sin(t*1.3 + i*0.65) * 2.5;
    i === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
  }
  for (let i = 24; i >= 0; i--) {
    const wx = (i/24)*W;
    const wy = H*0.595 + Math.sin(t*0.9 + i*0.55 + 1.8) * 2.5;
    ctx.lineTo(wx, wy);
  }
  ctx.closePath(); ctx.fill();

  // water flow shimmer lines
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.2;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    for (let x = 0; x <= W; x += 18) {
      const y = H*0.515 + i*H*0.014 + Math.sin(t*1.8 + x*0.045 + i*1.2) * 2;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  ctx.restore();

  // pebbles
  const pebbles = [
    [W*0.22, H*0.572, 9, 5, 0.2],
    [W*0.48, H*0.580, 11, 6, -0.1],
    [W*0.67, H*0.560, 8, 4.5, 0.3],
    [W*0.38, H*0.590, 6, 3.5, 0.1],
    [W*0.75, H*0.575, 7, 4, -0.2],
  ];
  pebbles.forEach(([px, py, rx, ry, ang]) => {
    ctx.fillStyle = 'rgba(172,162,148,0.75)';
    ctx.beginPath(); ctx.ellipse(px, py, rx, ry, ang, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(195,185,172,0.5)';
    ctx.beginPath(); ctx.ellipse(px-rx*0.25, py-ry*0.3, rx*0.4, ry*0.35, ang, 0, Math.PI*2); ctx.fill();
  });
}

// ══════════════════════════════════════════════
// SCENE 5 · 가을 낙엽  Autumn
// ══════════════════════════════════════════════
function initAutumn() {
  for (let i = 0; i < 55; i++) particles.push(makeAutumnLeaf(true));
}

const autumnHues = [8, 18, 26, 33, 42];

function makeAutumnLeaf(scatter) {
  const h = autumnHues[Math.floor(Math.random() * autumnHues.length)];
  return {
    type: 'autumn',
    x: Math.random() * W,
    y: scatter ? Math.random() * H : -18,
    vx: (Math.random() - 0.5) * 1.1,
    vy: 0.45 + Math.random() * 1.1,
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.065,
    size: 6 + Math.random() * 9,
    a: 0.78 + Math.random() * 0.22,
    swg: Math.random() * Math.PI * 2,
    swgS: 0.014 + Math.random() * 0.026,
    hue: h,
    shape: Math.floor(Math.random() * 3),
  };
}

function drawAutumnScene() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#dda848');
  sky.addColorStop(0.45,'#c88838');
  sky.addColorStop(1,   '#b87030');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // warm haze hills
  ctx.fillStyle = 'rgba(195,132,48,0.32)';
  ctx.beginPath(); ctx.ellipse(W*0.28, H*0.64, W*0.42, H*0.13, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(175,112,38,0.26)';
  ctx.beginPath(); ctx.ellipse(W*0.78, H*0.67, W*0.36, H*0.11, 0, 0, Math.PI*2); ctx.fill();

  // ground
  const gr = ctx.createLinearGradient(0, H*0.76, 0, H);
  gr.addColorStop(0, 'rgba(148,80,22,0.85)');
  gr.addColorStop(1, 'rgba(95,48,10,0.95)');
  ctx.fillStyle = gr; ctx.fillRect(0, H*0.78, W, H*0.22);

  // ground fallen leaves (static scatter)
  for (let i = 0; i < 28; i++) {
    const lx = (i / 28) * W * 1.08 - W * 0.04;
    const ly = H*0.83 + Math.sin(i * 1.4) * H*0.07;
    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(i * 0.72);
    ctx.globalAlpha = 0.58;
    ctx.fillStyle = `hsl(${autumnHues[i%autumnHues.length]},68%,42%)`;
    ctx.beginPath(); ctx.ellipse(0, 0, 7, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // tree silhouettes
  [[W*0.08, H*0.78], [W*0.92, H*0.80]].forEach(([tx, ty], idx) => {
    ctx.strokeStyle = 'rgba(70,32,10,0.72)';
    ctx.lineWidth = 11; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx, ty - H*0.38); ctx.stroke();
    ctx.lineWidth = 4.5;
    const brs = idx===0
      ? [[-52,H*0.24],[+46,H*0.27],[-24,H*0.32],[+18,H*0.36]]
      : [[+48,H*0.26],[-44,H*0.29],[+22,H*0.33],[-16,H*0.37]];
    brs.forEach(([bx, bd]) => {
      ctx.beginPath();
      ctx.moveTo(tx, ty-bd+Math.abs(bx)*0.28);
      ctx.quadraticCurveTo((tx+tx+bx)*0.5, ty-bd+10, tx+bx, ty-bd);
      ctx.stroke();
    });
    // remaining orange foliage puffs
    ctx.globalAlpha = 0.72;
    for (let i = 0; i < 10; i++) {
      ctx.fillStyle = `hsl(${20+i*4},68%,48%)`;
      ctx.beginPath();
      ctx.arc(tx - 32 + i*7, ty - H*0.34 + Math.sin(i*1.3)*14, 7+Math.sin(i)*2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });
}

function drawAutumnLeaf(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  ctx.globalAlpha = p.a;
  ctx.fillStyle = `hsl(${p.hue},72%,46%)`;
  ctx.beginPath();
  if (p.shape === 0) {
    // oval leaf
    ctx.ellipse(0, 0, p.size*0.65, p.size*0.95, 0, 0, Math.PI*2);
  } else if (p.shape === 1) {
    // pointed leaf
    ctx.moveTo(0, -p.size);
    ctx.bezierCurveTo(p.size*0.85, -p.size*0.3, p.size*0.65, p.size*0.55, 0, p.size*0.88);
    ctx.bezierCurveTo(-p.size*0.65, p.size*0.55, -p.size*0.85, -p.size*0.3, 0, -p.size);
  } else {
    // maple-ish (simplified)
    ctx.moveTo(0, -p.size);
    ctx.lineTo(p.size*0.4, -p.size*0.5);
    ctx.lineTo(p.size*0.9, -p.size*0.3);
    ctx.lineTo(p.size*0.5, p.size*0.1);
    ctx.lineTo(p.size*0.4, p.size*0.8);
    ctx.lineTo(0, p.size*0.5);
    ctx.lineTo(-p.size*0.4, p.size*0.8);
    ctx.lineTo(-p.size*0.5, p.size*0.1);
    ctx.lineTo(-p.size*0.9, -p.size*0.3);
    ctx.lineTo(-p.size*0.4, -p.size*0.5);
    ctx.closePath();
  }
  ctx.fill();
  ctx.restore();
}

function updateAutumnLeaf(p) {
  p.swg += p.swgS;
  p.x += p.vx + Math.sin(p.swg) * 1.0;
  p.y += p.vy;
  p.rot += p.rotV;
  if (p.y > H + 20) Object.assign(p, makeAutumnLeaf(false));
}

// ══════════════════════════════════════════════
// SCENE 6 · 연못의 잉어  Koi Pond
// ══════════════════════════════════════════════
const koiColors = [
  ['#ee5538','#f49060'],
  ['#f0e098','#f0b848'],
  ['#e87858','#f4a880'],
  ['#a8b8e8','#c8d8f8'],
  ['#f0f0e0','#d8d0b8'],
];

function initKoiPond() {
  for (let i = 0; i < 9; i++) extras.push(makePondRipple(true));
  for (let i = 0; i < 5; i++) {
    const c = koiColors[i % koiColors.length];
    const baseY = H*0.18 + i * (H*0.64/5);
    particles.push({
      type: 'koi',
      x: Math.random() * W,
      y: baseY,
      vx: (Math.random() < 0.5 ? 1 : -1) * (0.55 + Math.random() * 0.85),
      tail: Math.random() * Math.PI * 2,
      len: 26 + Math.random() * 18,
      girth: 8 + Math.random() * 5,
      c1: c[0], c2: c[1],
      a: 0.84 + Math.random() * 0.14,
      drift: Math.random() * Math.PI * 2,
      driftS: 0.008 + Math.random() * 0.012,
      baseY,
    });
  }
}

function makePondRipple(scatter) {
  return {
    type: 'pond_ripple',
    x: W*0.08 + Math.random()*W*0.84,
    y: H*0.12 + Math.random()*H*0.76,
    r: 0,
    maxR: 25 + Math.random()*55,
    a: 0.45,
    life: scatter ? Math.random()*90 : 0,
    maxLife: 80 + Math.random()*50,
  };
}

function drawPondScene() {
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,   '#264038');
  bg.addColorStop(0.35,'#285a58');
  bg.addColorStop(1,   '#183848');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // subtle water shimmer lines
  ctx.save();
  ctx.globalAlpha = 0.065;
  ctx.strokeStyle = '#c8e8d8';
  ctx.lineWidth = 1;
  for (let i = 0; i < 10; i++) {
    ctx.beginPath();
    for (let x = 0; x <= W; x += 14) {
      const y = H*(0.06 + i*0.092) + Math.sin(t*0.65 + x*0.038 + i) * 4.5;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  ctx.restore();

  // lily pads
  const lilyPos = [
    [W*0.18, H*0.28, 22],
    [W*0.72, H*0.48, 20],
    [W*0.38, H*0.70, 24],
    [W*0.84, H*0.22, 18],
    [W*0.55, H*0.15, 16],
  ];
  lilyPos.forEach(([lx, ly, lr], i) => {
    const ox = Math.sin(t*0.28+i) * 2.5;
    const oy = Math.cos(t*0.35+i) * 2;
    ctx.save();
    ctx.globalAlpha = 0.80;
    ctx.fillStyle = 'rgba(45,115,55,0.85)';
    ctx.beginPath();
    ctx.arc(lx+ox, ly+oy, lr, 0.18, Math.PI*1.88);
    ctx.lineTo(lx+ox, ly+oy);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(65,140,70,0.45)';
    ctx.lineWidth = 0.7; ctx.stroke();
    if (i % 2 === 0) {
      ctx.fillStyle = 'rgba(255,188,195,0.88)';
      ctx.beginPath(); ctx.arc(lx+ox, ly+oy-lr*0.18, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,220,90,0.9)';
      ctx.beginPath(); ctx.arc(lx+ox, ly+oy-lr*0.18, 2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

function drawKoi(p) {
  ctx.save();
  ctx.globalAlpha = p.a;
  const facingLeft = p.vx < 0;
  ctx.translate(p.x, p.y);
  if (facingLeft) ctx.scale(-1, 1);

  const wobble = Math.sin(p.tail) * 0.14;
  ctx.rotate(wobble);

  const L = p.len, G = p.girth;

  // body gradient
  const bg = ctx.createLinearGradient(-L*0.5, 0, L*0.5, 0);
  bg.addColorStop(0,   p.c1 + 'aa');
  bg.addColorStop(0.38, p.c2);
  bg.addColorStop(0.75, p.c1);
  bg.addColorStop(1,   p.c1 + '88');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.ellipse(0, 0, L*0.5, G*0.5, 0, 0, Math.PI*2); ctx.fill();

  // colour patch
  ctx.fillStyle = p.c1 + 'bb';
  ctx.beginPath(); ctx.ellipse(-L*0.08, -G*0.14, L*0.14, G*0.20, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(L*0.15, G*0.08, L*0.10, G*0.16, -0.2, 0, Math.PI*2); ctx.fill();

  // tail
  const tailSwing = Math.sin(p.tail) * G * 0.55;
  ctx.fillStyle = p.c1 + 'cc';
  ctx.beginPath();
  ctx.moveTo(-L*0.48, 0);
  ctx.quadraticCurveTo(-L*0.72, -G*0.9 + tailSwing, -L*0.92, -G*0.65);
  ctx.quadraticCurveTo(-L*0.68, 0, -L*0.92, G*0.65);
  ctx.quadraticCurveTo(-L*0.72, G*0.9 + tailSwing, -L*0.48, 0);
  ctx.fill();

  // pectoral fin
  ctx.fillStyle = p.c2 + 'aa';
  ctx.beginPath();
  ctx.moveTo(L*0.1, G*0.35);
  ctx.quadraticCurveTo(L*0.3, G*0.78, L*0.05, G*0.7);
  ctx.closePath(); ctx.fill();

  // eye
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(L*0.38, -G*0.12, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(L*0.388, -G*0.14, 0.7, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function updateKoi(p) {
  p.tail += 0.095;
  p.drift += p.driftS;
  p.x += p.vx;
  p.y = p.baseY + Math.sin(p.drift) * 14;
  if (p.x > W + 55) p.x = -55;
  if (p.x < -55) p.x = W + 55;
}

// ══════════════════════════════════════════════
// Main render loop
// ══════════════════════════════════════════════
function loop() {
  t += 0.016;
  ctx.clearRect(0, 0, W, H);
  const id = scenes[currentIdx].id;

  if (id === 'spring_tree') {
    drawSpringTree();
    if (Math.random() < 0.022 && particles.length < 58) particles.push(makeLeaf(false));
    particles.forEach(p => { updateLeaf(p); drawLeaf(p); });
  }

  else if (id === 'shooting_stars') {
    drawNightSky();
    // twinkle stars
    particles.forEach(p => {
      p.twk += p.twkS;
      const alpha = p.a * (0.55 + 0.45 * Math.sin(p.twk));
      ctx.fillStyle = `rgba(255,253,220,${alpha})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    });
    // shooters
    extras = extras.filter(s => {
      if (s.type !== 'shooter') return true;
      s.life++;
      const prog = s.life / s.maxLife;
      const alpha = prog < 0.22 ? prog/0.22 : prog > 0.72 ? (1-prog)/0.28 : 1;
      ctx.save();
      ctx.globalAlpha = alpha * 0.92;
      const grd = ctx.createLinearGradient(s.x, s.y, s.x - s.len, s.y - s.len*0.45);
      grd.addColorStop(0, 'rgba(255,252,200,1)');
      grd.addColorStop(0.55, 'rgba(255,252,200,0.35)');
      grd.addColorStop(1, 'rgba(255,252,200,0)');
      ctx.strokeStyle = grd; ctx.lineWidth = 2.2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x - s.len, s.y - s.len*0.42); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,215,0.98)';
      ctx.beginPath(); ctx.arc(s.x, s.y, 2.8, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      s.x += s.vx; s.y += s.vy;
      return s.life < s.maxLife;
    });
    if (Math.random() < 0.011) spawnShooter();
  }

  else if (id === 'snowfall') {
    drawSnowScene();
    particles.forEach(p => {
      p.swg += p.swgS;
      p.x += p.vx + Math.sin(p.swg) * 0.52;
      p.y += p.vy;
      if (p.y > H + 8) Object.assign(p, makeSnow(false));
      ctx.save();
      ctx.globalAlpha = p.a;
      ctx.fillStyle = '#e0eaf8';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
      // soft glow for larger flakes
      if (p.r > 2.8) {
        ctx.globalAlpha = p.a * 0.25;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 1.8, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    });
  }

  else if (id === 'stream') {
    drawStreamScene();
    // ripples
    extras = extras.filter(r => {
      if (r.type !== 'ripple') return true;
      r.life++;
      r.r = (r.life / r.maxLife) * r.maxR;
      const a = r.a * (1 - r.life / r.maxLife);
      ctx.save(); ctx.globalAlpha = a;
      ctx.strokeStyle = 'rgba(255,255,255,0.82)'; ctx.lineWidth = 0.9;
      ctx.beginPath(); ctx.ellipse(r.x, r.y, r.r, r.r * 0.32, 0, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
      return r.life < r.maxLife;
    });
    if (Math.random() < 0.035) extras.push(makeRipple(false));
    // bubbles
    particles.forEach(p => {
      p.y += p.vy; p.x += p.vx;
      if (p.y < H*0.46 || p.y > H*0.62) { Object.assign(p, makeBubble(false)); return; }
      ctx.save(); ctx.globalAlpha = p.a;
      ctx.strokeStyle = 'rgba(255,255,255,0.72)'; ctx.lineWidth = 0.9;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fill();
      ctx.restore();
    });
  }

  else if (id === 'autumn') {
    drawAutumnScene();
    if (Math.random() < 0.025 && particles.length < 72) particles.push(makeAutumnLeaf(false));
    particles.forEach(p => { updateAutumnLeaf(p); drawAutumnLeaf(p); });
  }

  else if (id === 'koi_pond') {
    drawPondScene();
    // pond ripples
    extras = extras.filter(r => {
      if (r.type !== 'pond_ripple') return true;
      r.life++;
      r.r = (r.life / r.maxLife) * r.maxR;
      const a = r.a * (1 - r.life / r.maxLife) * 0.65;
      ctx.save(); ctx.globalAlpha = a;
      ctx.strokeStyle = 'rgba(195,228,215,0.9)'; ctx.lineWidth = 0.75;
      ctx.beginPath(); ctx.ellipse(r.x, r.y, r.r, r.r*0.38, 0, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
      return r.life < r.maxLife;
    });
    if (Math.random() < 0.022) extras.push(makePondRipple(false));
    particles.forEach(p => { updateKoi(p); drawKoi(p); });
  }

  animId = requestAnimationFrame(loop);
}

// ── Boot ──
buildDots();
resize();

})();
</script>
</body>
</html>
