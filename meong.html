<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0820">
<title>N멍</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&display=swap');
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden; background:#000;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
    user-select:none; -webkit-user-select:none;
  }
  #app {
    position:fixed; top:0; left:0; width:100%; height:100%;
    touch-action:none; overflow:hidden;
  }
  canvas#c {
    position:absolute; top:0; left:0; width:100%; height:100%; display:block;
  }
  /* 낙엽 캔버스 — 봄 나무 테마 전용, 메인 캔버스 위 */
  canvas#leaf-canvas {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:2; display:block;
  }
  #top-bar {
    position:absolute; top:0; left:0; right:0;
    padding:max(env(safe-area-inset-top,16px),16px) 20px 0;
    display:flex; align-items:center; gap:10px;
    z-index:30; pointer-events:none;
  }
  #app-icon {
    width:38px; height:38px; border-radius:11px;
    background:rgba(255,255,255,0.14);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:0.5px solid rgba(255,255,255,0.22);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  #app-name {
    font-family:'Noto Serif KR',serif; font-size:22px; font-weight:300;
    color:rgba(255,255,255,0.92); letter-spacing:2px;
    text-shadow:0 2px 12px rgba(0,0,0,0.3);
  }
  #scene-label {
    position:absolute;
    bottom:calc(env(safe-area-inset-bottom,0px) + 58px);
    left:50%; transform:translateX(-50%);
    font-family:'Noto Sans KR',sans-serif; font-size:12px; font-weight:300;
    color:rgba(255,255,255,0.65); letter-spacing:2.5px;
    text-shadow:0 1px 8px rgba(0,0,0,0.4);
    white-space:nowrap; z-index:30; pointer-events:none;
    transition:opacity 0.6s ease;
  }
  #dots {
    position:absolute;
    bottom:calc(env(safe-area-inset-bottom,0px) + 34px);
    left:50%; transform:translateX(-50%);
    display:flex; gap:7px; align-items:center;
    z-index:30; pointer-events:none;
  }
  .dot {
    width:5px; height:5px; border-radius:50%;
    background:rgba(255,255,255,0.3);
    transition:all 0.45s cubic-bezier(0.34,1.56,0.64,1);
  }
  .dot.active { width:20px; border-radius:3px; background:rgba(255,255,255,0.82); }
  .arrow-btn {
    position:absolute; top:50%; transform:translateY(-50%);
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border:0.5px solid rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; z-index:30;
    transition:background 0.2s, transform 0.15s;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  }
  .arrow-btn:active { background:rgba(255,255,255,0.25); transform:translateY(-50%) scale(0.93); }
  #btn-left  { left:14px; }
  #btn-right { right:14px; }
  #fade {
    position:absolute; top:0; left:0; right:0; bottom:0;
    background:#000; opacity:0; pointer-events:none; z-index:20;
    transition:opacity 0.32s ease;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="c"></canvas>
  <canvas id="leaf-canvas"></canvas>
  <div id="fade"></div>
  <div id="top-bar">
    <div id="app-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C7.5 2 4 6.5 4 11C4 16 8 20 12 22C16 20 20 16 20 11C20 6.5 16.5 2 12 2Z"
              fill="rgba(255,255,255,0.75)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
        <path d="M12 8V16M9 12.5C10.5 14 13.5 14 15 12.5"
              stroke="rgba(255,255,255,0.45)" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>
    <span id="app-name">N멍</span>
  </div>
  <div id="scene-label"></div>
  <div id="dots"></div>
  <button class="arrow-btn" id="btn-left" aria-label="이전 장면">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M11 4L6 9L11 14" stroke="rgba(255,255,255,0.88)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="arrow-btn" id="btn-right" aria-label="다음 장면">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M7 4L12 9L7 14" stroke="rgba(255,255,255,0.88)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const fade   = document.getElementById('fade');
const labelEl= document.getElementById('scene-label');
const dotsEl = document.getElementById('dots');
let W, H, dpr = Math.min(window.devicePixelRatio||1,2);

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width  = Math.round(W*dpr);
  canvas.height = Math.round(H*dpr);
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.scale(dpr,dpr);
  // 낙엽 캔버스 리사이즈
  const lc = document.getElementById('leaf-canvas');
  lc.width  = Math.round(W*dpr);
  lc.height = Math.round(H*dpr);
  lc.style.width = W+'px'; lc.style.height = H+'px';
  initScene();
}
window.addEventListener('resize', resize);

// 연못 제거: 5개 장면만
const scenes = [
  { name:'봄 나무',      id:'spring_tree'    },
  { name:'별똥별',       id:'shooting_stars' },
  { name:'눈 내리는 밤', id:'snowfall'       },
  { name:'빗속의 호수',  id:'lake_rain'      },
  { name:'가을 낙엽',    id:'autumn'         },
];

let currentIdx = Math.floor(Math.random()*scenes.length);
let particles=[], extras=[], animId, t=0;

function buildDots() {
  dotsEl.innerHTML='';
  scenes.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===currentIdx?' active':'');
    dotsEl.appendChild(d);
  });
}
function updateUI(){ labelEl.textContent=scenes[currentIdx].name; buildDots(); }

function changeScene(dir) {
  fade.style.opacity='1';
  setTimeout(()=>{
    currentIdx=(currentIdx+dir+scenes.length)%scenes.length;
    updateUI(); initScene(); fade.style.opacity='0';
  },320);
}
document.getElementById('btn-left').addEventListener('click',()=>changeScene(-1));
document.getElementById('btn-right').addEventListener('click',()=>changeScene(1));

let touchX0=null, touchY0=null;
document.getElementById('app').addEventListener('touchstart',e=>{
  touchX0=e.touches[0].clientX; touchY0=e.touches[0].clientY;
},{passive:true});
document.getElementById('app').addEventListener('touchend',e=>{
  if(touchX0===null) return;
  const dx=e.changedTouches[0].clientX-touchX0;
  const dy=e.changedTouches[0].clientY-touchY0;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>48) changeScene(dx<0?1:-1);
  touchX0=touchY0=null;
},{passive:true});
document.getElementById('app').addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

function initScene() {
  particles=[]; extras=[]; t=0;
  cancelAnimationFrame(animId);
  const id=scenes[currentIdx].id;
  if      (id==='spring_tree')    initSpringTree();
  else if (id==='shooting_stars') initShootingStars();
  else if (id==='snowfall')       initSnowfall();
  else if (id==='lake_rain')      initLakeRain();
  else if (id==='autumn')         initAutumn();
  loop();
}

/* ════════════════════════════════════════════
   1. 봄 나무 — 하루 감정 나무+낙엽 이식
      파티클 없음: 낙엽은 leaf-canvas에서 처리
   ════════════════════════════════════════════ */
function initSpringTree() {
  // 파티클/extras 불필요 — 낙엽은 별도 leaf-canvas 루프에서 관리
}

function drawSpringBG() {
  // 배경 하늘 — 하루 감정과 동일한 색상
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#bde8a8');
  sky.addColorStop(0.5, '#d8f0c8');
  sky.addColorStop(1, '#e8f5d8');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // 잔디
  const gr = ctx.createLinearGradient(0, H*0.78, 0, H);
  gr.addColorStop(0, 'rgba(130,185,95,0.7)');
  gr.addColorStop(1, 'rgba(100,155,65,0.9)');
  ctx.fillStyle = gr;
  ctx.fillRect(0, H*0.80, W, H*0.20);

  // 하루 감정 SVG 좌표계(390×540)를 현재 화면 크기로 스케일
  const sx = W / 390;
  const sy = H / 540;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // 그림자
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#d4c4a8';
  ctx.beginPath();
  ctx.ellipse(195*sx, 494*sy, 82*sx, 13*sy, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // 줄기 (왼쪽 밝은 면)
  ctx.strokeStyle = '#c8a97a'; ctx.lineWidth = 26*Math.min(sx,sy);
  ctx.beginPath();
  ctx.moveTo(174*sx, 496*sy);
  ctx.bezierCurveTo(175*sx,430*sy, 179*sx,368*sy, 181*sx,328*sy);
  ctx.stroke();

  // 줄기 (오른쪽 어두운 면)
  ctx.strokeStyle = '#b8956a'; ctx.lineWidth = 19*Math.min(sx,sy);
  ctx.beginPath();
  ctx.moveTo(216*sx, 496*sy);
  ctx.bezierCurveTo(215*sx,430*sy, 211*sx,368*sy, 209*sx,328*sy);
  ctx.stroke();

  // 가지
  ctx.strokeStyle = '#c8a97a';
  [
    {w:12, pts:[181,328, 158,286, 122,242, 84,198]},
    {w:11, pts:[196,302, 220,260, 258,226, 296,194]},
    {w:10, pts:[183,344, 150,328, 115,306, 82,268]},
    {w:10, pts:[207,340, 242,324, 278,304, 308,268]},
    {w:9,  pts:[190,275, 192,234, 191,192, 192,152]},
  ].forEach(b => {
    ctx.lineWidth = b.w * Math.min(sx,sy);
    ctx.beginPath();
    ctx.moveTo(b.pts[0]*sx, b.pts[1]*sy);
    ctx.bezierCurveTo(b.pts[2]*sx,b.pts[3]*sy, b.pts[4]*sx,b.pts[5]*sy, b.pts[6]*sx,b.pts[7]*sy);
    ctx.stroke();
  });

  // 작은 가지 (상단 좌우)
  ctx.lineWidth = 6*Math.min(sx,sy);
  ctx.beginPath(); ctx.moveTo(192*sx,165*sy); ctx.lineTo(118*sx,125*sy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(192*sx,165*sy); ctx.lineTo(264*sx,125*sy); ctx.stroke();

  // 잎사귀 타원 레이어 (하루 감정 SVG 그대로)
  [
    {cx:195,cy:255,rx:155,ry:138,op:0.17,c:'#5fa85f'},
    {cx:148,cy:232,rx:135,ry:120,op:0.19,c:'#6ab86a'},
    {cx:244,cy:228,rx:132,ry:118,op:0.19,c:'#6ab86a'},
    {cx:195,cy:218,rx:145,ry:128,op:0.23,c:'#78c878'},
    {cx:162,cy:200,rx:118,ry:106,op:0.27,c:'#88d288'},
    {cx:230,cy:196,rx:115,ry:103,op:0.27,c:'#88d288'},
    {cx:195,cy:178,rx:128,ry:114,op:0.30,c:'#96dc96'},
    {cx:172,cy:164,rx:100,ry:90, op:0.28,c:'#a4e0a4'},
    {cx:220,cy:161,rx:97, ry:87, op:0.28,c:'#a4e0a4'},
    {cx:195,cy:142,rx:102,ry:92, op:0.32,c:'#b0e6b0'},
    {cx:176,cy:128,rx:78, ry:70, op:0.28,c:'#bceabc'},
    {cx:215,cy:125,rx:75, ry:67, op:0.28,c:'#bceabc'},
    {cx:195,cy:110,rx:65, ry:58, op:0.30,c:'#c6eec6'},
  ].forEach(b => {
    ctx.globalAlpha = b.op;
    ctx.fillStyle   = b.c;
    ctx.beginPath();
    ctx.ellipse(b.cx*sx, b.cy*sy, b.rx*sx, b.ry*sy, 0, 0, Math.PI*2);
    ctx.fill();
  });

  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ════════════════════════════════════════════
   2. 별똥별 — 원본 그대로
   ════════════════════════════════════════════ */
function initShootingStars() {
  for(let i=0;i<130;i++) particles.push({
    type:'star', x:Math.random()*W, y:Math.random()*H*0.88,
    r:0.3+Math.random()*1.3, a:0.25+Math.random()*0.75,
    twk:Math.random()*Math.PI*2, twkS:0.005+Math.random()*0.015,
  });
  spawnShooter();
}

function spawnShooter() {
  const speed = 0.6 + Math.random()*1.0;
  let sx, sy, angle;
  const edge = Math.floor(Math.random()*3);
  if(edge===0){
    sx = Math.random()*W; sy = -10;
    angle = (25+Math.random()*130)*Math.PI/180;
  } else if(edge===1){
    sx = -10; sy = Math.random()*H*0.4;
    angle = (10+Math.random()*65)*Math.PI/180;
  } else {
    sx = W+10; sy = Math.random()*H*0.4;
    angle = (105+Math.random()*65)*Math.PI/180;
  }
  extras.push({
    type:'shooter',
    x:sx, y:sy,
    vx:Math.cos(angle)*speed,
    vy:Math.sin(angle)*speed,
    trail:[],
    life:0,
    maxLife:200+Math.random()*150,
  });
}

function drawNightBG() {
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#080620'); sky.addColorStop(0.45,'#100e38'); sky.addColorStop(1,'#181658');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  ctx.save(); ctx.globalAlpha=0.06;
  const mw=ctx.createRadialGradient(W*0.5,H*0.32,0,W*0.5,H*0.32,W*0.7);
  mw.addColorStop(0,'#c8b8ee'); mw.addColorStop(1,'transparent');
  ctx.fillStyle=mw;
  ctx.beginPath(); ctx.ellipse(W*0.5,H*0.32,W*0.72,H*0.22,-0.28,0,Math.PI*2); ctx.fill();
  ctx.restore();

  const mx = W*0.82, my = H*0.10, mr = 26;
  // 달빛 글로우
  ctx.save();
  const moonGlow = ctx.createRadialGradient(mx,my,0,mx,my,mr*3.5);
  moonGlow.addColorStop(0,'rgba(255,245,200,0.18)');
  moonGlow.addColorStop(0.4,'rgba(255,240,180,0.07)');
  moonGlow.addColorStop(1,'transparent');
  ctx.fillStyle=moonGlow; ctx.beginPath(); ctx.arc(mx,my,mr*3.5,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 초승달 — offscreen canvas로 깔끔하게
  {
    const oc = document.createElement('canvas');
    oc.width = Math.round((mr*8)*dpr); oc.height = Math.round((mr*8)*dpr);
    const oc2 = oc.getContext('2d');
    oc2.scale(dpr,dpr);
    const cx=mr*4, cy=mr*4;
    oc2.clearRect(0,0,mr*8,mr*8);
    // 달 본체
    oc2.beginPath(); oc2.arc(cx,cy,mr,0,Math.PI*2);
    oc2.fillStyle='#fff8d8'; oc2.fill();
    // 그림자 부분 지우기
    oc2.globalCompositeOperation='destination-out';
    oc2.beginPath(); oc2.arc(cx+mr*0.72, cy-mr*0.12, mr*0.88, 0, Math.PI*2);
    oc2.fillStyle='rgba(0,0,0,1)'; oc2.fill();
    // offscreen을 메인에 합성
    ctx.save();
    ctx.drawImage(oc, Math.round((mx-mr*4)*dpr), Math.round((my-mr*4)*dpr), Math.round(mr*8*dpr), Math.round(mr*8*dpr),
                  mx-mr*4, my-mr*4, mr*8, mr*8);
    ctx.restore();
  }

  ctx.fillStyle='rgba(5,4,20,0.96)';
  ctx.beginPath(); ctx.moveTo(0,H);
  ctx.bezierCurveTo(W*0.1,H*0.84,W*0.22,H*0.80,W*0.32,H*0.86);
  ctx.bezierCurveTo(W*0.42,H*0.92,W*0.52,H*0.78,W*0.64,H*0.84);
  ctx.bezierCurveTo(W*0.76,H*0.90,W*0.88,H*0.82,W,H*0.87);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
}

/* ════════════════════════════════════════════
   3. 눈 내리는 밤 — 원본 그대로
   ════════════════════════════════════════════ */
function initSnowfall() {
  for(let i=0;i<60;i++) particles.push(makeSnow(true));
}
function makeSnow(scatter) {
  return {
    type:'snow',
    x:Math.random()*W,
    y:scatter?Math.random()*H:-8,
    r:1.4+Math.random()*3.8,
    vx:(Math.random()-0.5)*0.28,
    vy:0.18+Math.random()*0.38,
    a:0.45+Math.random()*0.55,
    swg:Math.random()*Math.PI*2,
    swgS:0.003+Math.random()*0.008,
    rot:Math.random()*Math.PI*2,
  };
}

function drawSnowflake(x,y,r,alpha,rot) {
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.fillStyle='rgba(215,232,255,0.90)';
  ctx.translate(x,y); ctx.rotate(rot);
  const pts = 8;
  ctx.beginPath();
  for(let i=0;i<=pts;i++){
    const ang = (i/pts)*Math.PI*2;
    const wobble = 1 + (Math.sin(ang*2.3+rot*1.7)*0.06 + Math.cos(ang*1.7+rot)*0.05);
    const rx = r*wobble;
    const ry = r*(1/wobble);
    const px = Math.cos(ang)*rx;
    const py = Math.sin(ang)*ry;
    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawNaturalPine(px, py, treeH, sc) {
  ctx.save();
  // 줄기
  ctx.strokeStyle='#3a2510'; ctx.lineWidth=7*sc; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py - treeH*0.12); ctx.stroke();

  // 난수 시드를 px 기반으로 고정해 매 프레임 동일한 모양 유지
  const seed = px * 137.5;
  function sr(i){ return (Math.sin(seed+i*9.3)*0.5+0.5); }

  // 레이어 수를 늘리고 각 레이어에 불규칙성 추가
  const layerCount = 9;
  for(let li=0; li<layerCount; li++){
    const ratio = li/layerCount;
    const centerY = py - treeH*(0.10 + ratio*0.84);
    const maxW = treeH * sc * (0.52 - ratio*0.44);
    const lh = treeH * sc * (0.13 + sr(li*3)*0.05);

    // 기본 녹색층
    const green = Math.floor(22 + li*11 + sr(li)*8);
    ctx.fillStyle = `rgba(12,${green},18,0.88)`;

    // 왼쪽/오른쪽 가지를 약간 다르게 (비대칭)
    const lw = maxW * (0.82 + sr(li*2)*0.26);
    const rw = maxW * (0.82 + sr(li*2+1)*0.26);
    const dropL = lh * (0.18 + sr(li*4)*0.18);
    const dropR = lh * (0.18 + sr(li*4+1)*0.18);
    const tipJitter = (sr(li*5)-0.5)*lh*0.3;

    ctx.beginPath();
    ctx.moveTo(px, centerY - lh + tipJitter);
    ctx.bezierCurveTo(
      px + rw*0.3, centerY - lh*0.4,
      px + rw*0.82, centerY - lh*0.05 + sr(li)*lh*0.1,
      px + rw, centerY + dropR
    );
    ctx.bezierCurveTo(
      px + rw*0.45, centerY + lh*0.22,
      px + rw*0.12, centerY + lh*0.28,
      px, centerY + lh*0.10
    );
    ctx.bezierCurveTo(
      px - lw*0.12, centerY + lh*0.28,
      px - lw*0.45, centerY + lh*0.22,
      px - lw, centerY + dropL
    );
    ctx.bezierCurveTo(
      px - lw*0.82, centerY - lh*0.05 + sr(li+1)*lh*0.1,
      px - lw*0.3, centerY - lh*0.4,
      px, centerY - lh + tipJitter
    );
    ctx.fill();

    // 눈 — 윗면에 자연스럽게
    const snowDepth = 0.55 + sr(li*6)*0.25;
    ctx.fillStyle='rgba(218,232,250,0.82)';
    ctx.beginPath();
    ctx.moveTo(px - lh*0.12, centerY - lh*0.80 + tipJitter);
    ctx.bezierCurveTo(
      px - lw*0.35, centerY - lh*0.42,
      px - rw*0.70, centerY - lh*snowDepth*0.05,
      px - rw*0.68, centerY
    );
    ctx.bezierCurveTo(
      px - rw*0.40, centerY - lh*0.08,
      px - rw*0.10, centerY - lh*0.22,
      px, centerY - lh*0.18
    );
    ctx.bezierCurveTo(
      px + lw*0.10, centerY - lh*0.22,
      px + lw*0.40, centerY - lh*0.08,
      px + lw*0.68, centerY
    );
    ctx.bezierCurveTo(
      px + lw*0.70, centerY - lh*snowDepth*0.05,
      px + rw*0.35, centerY - lh*0.42,
      px + lh*0.12, centerY - lh*0.80 + tipJitter
    );
    ctx.fill();

    // 가끔 작은 가지 돌기 추가
    if(li > 1 && sr(li*7) > 0.62){
      ctx.fillStyle=`rgba(12,${green+5},18,0.65)`;
      const bx = px + (sr(li*8)-0.5)*rw*1.6;
      const bSize = maxW*0.22;
      ctx.beginPath();
      ctx.moveTo(bx, centerY - bSize*0.6);
      ctx.bezierCurveTo(bx+bSize*0.7,centerY-bSize*0.2, bx+bSize*0.9,centerY+bSize*0.2, bx+bSize*0.6,centerY+bSize*0.4);
      ctx.bezierCurveTo(bx,centerY+bSize*0.5, bx-bSize*0.6,centerY+bSize*0.4, bx-bSize*0.9,centerY+bSize*0.2);
      ctx.bezierCurveTo(bx-bSize*0.7,centerY-bSize*0.2, bx,centerY-bSize*0.6, bx,centerY-bSize*0.6);
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawSnowBG() {
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#141e2e'); sky.addColorStop(0.55,'#1e2c48'); sky.addColorStop(1,'#2a3a5e');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  const mx=W*0.78, my=H*0.12, mr=28;
  ctx.save();
  // 보름달 글로우 (여러 겹)
  const moonGlow2=ctx.createRadialGradient(mx,my,0,mx,my,mr*4.5);
  moonGlow2.addColorStop(0,'rgba(210,228,255,0.22)');
  moonGlow2.addColorStop(0.3,'rgba(200,218,255,0.10)');
  moonGlow2.addColorStop(0.7,'rgba(190,210,255,0.04)');
  moonGlow2.addColorStop(1,'transparent');
  ctx.fillStyle=moonGlow2; ctx.beginPath(); ctx.arc(mx,my,mr*4.5,0,Math.PI*2); ctx.fill();

  // 보름달 본체 — 그라디언트로 입체감
  const moonBody=ctx.createRadialGradient(mx-mr*0.22,my-mr*0.22,mr*0.05,mx,my,mr);
  moonBody.addColorStop(0,'#f0f6ff');
  moonBody.addColorStop(0.5,'#ddeaff');
  moonBody.addColorStop(0.85,'#c8d8f0');
  moonBody.addColorStop(1,'#b8cce8');
  ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2);
  ctx.fillStyle=moonBody; ctx.fill();

  // 달 표면 크레이터 느낌 (매우 연하게)
  ctx.globalAlpha=0.07;
  ctx.fillStyle='#8899bb';
  ctx.beginPath(); ctx.arc(mx+mr*0.28,my-mr*0.18,mr*0.22,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx-mr*0.32,my+mr*0.30,mr*0.14,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx+mr*0.05,my+mr*0.42,mr*0.10,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // 달 테두리 미광
  ctx.strokeStyle='rgba(200,220,255,0.25)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.stroke();
  ctx.restore();

  const gd=ctx.createLinearGradient(0,H*0.82,0,H);
  gd.addColorStop(0,'#d8e4ee'); gd.addColorStop(1,'#e8f0f8');
  ctx.fillStyle=gd;
  ctx.beginPath(); ctx.moveTo(0,H*0.84);
  ctx.bezierCurveTo(W*0.2,H*0.81,W*0.4,H*0.83,W*0.6,H*0.82);
  ctx.bezierCurveTo(W*0.8,H*0.81,W*0.9,H*0.84,W,H*0.83);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

  drawNaturalPine(W*0.22, H*0.84, H*0.50, 0.82);
  drawNaturalPine(W*0.50, H*0.83, H*0.58, 1.0);
  drawNaturalPine(W*0.78, H*0.84, H*0.44, 0.74);
}

/* ════════════════════════════════════════════
   4. 빗속의 호수 — 원본 그대로
   ════════════════════════════════════════════ */
function initLakeRain() {
  for(let i=0;i<28;i++) particles.push(makeRaindrop(true));
}

function makeRaindrop(scatter) {
  return {
    type:'raindrop',
    x: W*0.04+Math.random()*W*0.92,
    y: scatter ? -Math.random()*H*0.5 : -20,
    vy: 0.7+Math.random()*0.8,
    len: 7+Math.random()*9,
    a: 0.25+Math.random()*0.30,
    w: 0.5+Math.random()*0.6,
  };
}

function spawnRipple(x,y) {
  extras.push({
    type:'ripple',
    x, y,
    r: 0,
    maxR: 8+Math.random()*38,
    ryRatio: 0.22+Math.random()*0.22,
    life: 0,
    maxLife: 160+Math.random()*120,
    a: 0.35,
    born: t,
  });
}

function drawLakeBG() {
  const lakeY=H*0.44;

  const sky=ctx.createLinearGradient(0,0,0,lakeY);
  sky.addColorStop(0,'#3a4858'); sky.addColorStop(1,'#4e6070');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,lakeY);

  ctx.fillStyle='rgba(55,75,95,0.55)';
  ctx.beginPath(); ctx.moveTo(0,lakeY);
  ctx.quadraticCurveTo(W*0.15,H*0.25,W*0.28,lakeY);
  ctx.quadraticCurveTo(W*0.42,H*0.20,W*0.58,lakeY);
  ctx.quadraticCurveTo(W*0.74,H*0.22,W*0.88,lakeY);
  ctx.quadraticCurveTo(W*0.95,H*0.28,W,lakeY);
  ctx.lineTo(W,0); ctx.lineTo(0,0); ctx.closePath(); ctx.fill();

  const lg=ctx.createLinearGradient(0,lakeY,0,H);
  lg.addColorStop(0,'rgba(72,102,132,0.95)');
  lg.addColorStop(0.4,'rgba(58,88,118,0.97)');
  lg.addColorStop(1,'rgba(40,65,98,1)');
  ctx.fillStyle=lg;
  ctx.beginPath();
  for(let x2=0;x2<=W;x2+=18){
    const wy=lakeY+Math.sin(t*0.7+x2*0.038)*2.2;
    x2===0?ctx.moveTo(x2,wy):ctx.lineTo(x2,wy);
  }
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

  ctx.save(); ctx.globalAlpha=0.055;
  ctx.strokeStyle='rgba(195,218,238,1)'; ctx.lineWidth=1.1;
  for(let i=0;i<5;i++){
    ctx.beginPath();
    for(let x2=0;x2<=W;x2+=15){
      const wy=lakeY+H*0.05+i*H*0.08+Math.sin(t*0.85+x2*0.05+i)*3;
      x2===0?ctx.moveTo(x2,wy):ctx.lineTo(x2,wy);
    }
    ctx.stroke();
  }
  ctx.restore();

  ctx.fillStyle='rgba(28,40,52,0.80)';
  ctx.beginPath(); ctx.moveTo(0,lakeY); ctx.lineTo(W*0.10,lakeY);
  ctx.quadraticCurveTo(W*0.14,H*0.26,W*0.06,H*0.08);
  ctx.quadraticCurveTo(W*0.01,H*0.24,0,lakeY); ctx.fill();
  ctx.beginPath(); ctx.moveTo(W,lakeY); ctx.lineTo(W*0.90,lakeY);
  ctx.quadraticCurveTo(W*0.85,H*0.26,W*0.93,H*0.07);
  ctx.quadraticCurveTo(W*0.99,H*0.23,W,lakeY); ctx.fill();
}

/* ════════════════════════════════════════════
   5. 가을 낙엽 — 원본 그대로
   ════════════════════════════════════════════ */
function initAutumn() {
  extras=[];
  for(let i=0;i<10;i++) particles.push(makeAutumnLeaf(true));
}
const autumnHues=[8,18,26,33,42];
function makeAutumnLeaf(scatter) {
  const h=autumnHues[Math.floor(Math.random()*autumnHues.length)];
  return {
    type:'autumn',
    x:Math.random()*W,
    y:scatter?Math.random()*H:-18,
    vx:(Math.random()-0.5)*0.48,
    vy:0.14+Math.random()*0.30,
    rot:Math.random()*Math.PI*2,
    rotV:(Math.random()-0.5)*0.020,
    size:6+Math.random()*9,
    a:0.78+Math.random()*0.22,
    swg:Math.random()*Math.PI*2,
    swgS:0.007+Math.random()*0.012,
    hue:h, shape:Math.floor(Math.random()*3),
    landing: false,
  };
}

function drawAutumnBG() {
  // 하늘 — 가을 노을빛
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#c8723a'); sky.addColorStop(0.35,'#d8884a'); sky.addColorStop(0.7,'#c07030'); sky.addColorStop(1,'#8a4a18');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 구름 느낌 — 연한 노을빛 덩어리
  ctx.save(); ctx.globalAlpha=0.18;
  ctx.fillStyle='#f0c070';
  ctx.beginPath(); ctx.ellipse(W*0.22,H*0.18,W*0.28,H*0.06,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(W*0.72,H*0.12,W*0.20,H*0.04,0.1,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 지면
  const gr=ctx.createLinearGradient(0,H*0.76,0,H);
  gr.addColorStop(0,'rgba(100,48,12,0.90)'); gr.addColorStop(1,'rgba(62,28,6,0.98)');
  ctx.fillStyle=gr; ctx.fillRect(0,H*0.78,W,H*0.22);

  // 바닥에 쌓인 낙엽들 (정적)
  for(let i=0;i<30;i++){
    const lx = (i/30)*W*1.05 - W*0.02 + Math.sin(i*2.7)*W*0.02;
    const ly = H*0.80 + Math.sin(i*1.9)*H*0.06;
    const lhue = autumnHues[i%autumnHues.length];
    const lsize = 5 + Math.sin(i*3.1)*3;
    ctx.save(); ctx.translate(lx,ly); ctx.rotate(i*0.58+0.3); ctx.globalAlpha=0.55;
    ctx.fillStyle=`hsl(${lhue},65%,42%)`;
    drawLeafShape(0,0,lsize, i%3);
    ctx.restore();
  }

  // 왼쪽 나무
  drawAutumnTree(W*0.25, H*0.78, H*0.42, 0);
  // 오른쪽 나무
  drawAutumnTree(W*0.76, H*0.78, H*0.36, 1);
}

function drawLeafShape(x, y, size, shape){
  ctx.beginPath();
  if(shape===0){
    // 타원형 잎
    ctx.ellipse(x, y, size*0.58, size*0.88, 0, 0, Math.PI*2);
  } else if(shape===1){
    // 단풍잎형
    ctx.moveTo(x, y-size);
    ctx.bezierCurveTo(x+size*0.9, y-size*0.25, x+size*0.7, y+size*0.55, x, y+size*0.85);
    ctx.bezierCurveTo(x-size*0.7, y+size*0.55, x-size*0.9, y-size*0.25, x, y-size);
  } else {
    // 작은 뾰족 단풍잎
    const pts=5;
    for(let i=0;i<pts;i++){
      const a0=(i/pts)*Math.PI*2 - Math.PI/2;
      const a1=((i+0.5)/pts)*Math.PI*2 - Math.PI/2;
      const ox=x+Math.cos(a0)*size, oy=y+Math.sin(a0)*size;
      const ix=x+Math.cos(a1)*size*0.42, iy=y+Math.sin(a1)*size*0.42;
      i===0?ctx.moveTo(ox,oy):ctx.lineTo(ox,oy);
      ctx.lineTo(ix,iy);
    }
    ctx.closePath();
  }
  ctx.fill();
}

function drawAutumnTree(tx, ty, treeH, treeIdx) {
  // 줄기 — 불규칙한 곡선
  const seed2 = tx * 53.7;
  function sr2(i){ return Math.sin(seed2+i*7.3)*0.5+0.5; }

  ctx.save();
  ctx.lineCap='round'; ctx.lineJoin='round';

  // 두꺼운 줄기
  const trunkW = treeH * 0.045;
  ctx.strokeStyle='rgba(52,24,8,0.90)';
  ctx.lineWidth = trunkW;
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.bezierCurveTo(
    tx + (sr2(1)-0.5)*trunkW*3, ty - treeH*0.28,
    tx + (sr2(2)-0.5)*trunkW*4, ty - treeH*0.52,
    tx + (sr2(3)-0.5)*treeH*0.08, ty - treeH*0.65
  );
  ctx.stroke();

  // 주요 가지 4~5개
  const branches = [
    { fromY: 0.32, angle: treeIdx===0?-0.9:0.85, len: treeH*0.30, thick: trunkW*0.55 },
    { fromY: 0.42, angle: treeIdx===0?0.7:-0.75, len: treeH*0.28, thick: trunkW*0.50 },
    { fromY: 0.52, angle: treeIdx===0?-0.6:0.65, len: treeH*0.24, thick: trunkW*0.42 },
    { fromY: 0.60, angle: treeIdx===0?0.5:-0.55, len: treeH*0.20, thick: trunkW*0.35 },
    { fromY: 0.65, angle: 0, len: treeH*0.18, thick: trunkW*0.30 },
  ];

  branches.forEach((b, bi) => {
    const bx = tx + (sr2(bi*3+4)-0.5)*treeH*0.06;
    const by = ty - treeH * b.fromY;
    const ex = bx + Math.cos(b.angle - Math.PI/2)*b.len;
    const ey = by + Math.sin(b.angle - Math.PI/2)*b.len;

    ctx.strokeStyle='rgba(52,24,8,0.80)';
    ctx.lineWidth = b.thick;
    ctx.beginPath(); ctx.moveTo(bx,by);
    ctx.bezierCurveTo(
      bx+(ex-bx)*0.35+(sr2(bi*2)-0.5)*b.len*0.18,
      by+(ey-by)*0.35+(sr2(bi*2+1)-0.5)*b.len*0.18,
      bx+(ex-bx)*0.65+(sr2(bi*3)-0.5)*b.len*0.12,
      by+(ey-by)*0.65+(sr2(bi*3+1)-0.5)*b.len*0.12,
      ex, ey
    );
    ctx.stroke();

    // 각 가지 끝에 잎 클러스터
    const clusterSize = b.len * (0.55 + sr2(bi*5)*0.30);
    drawLeafCluster(ex, ey, clusterSize, sr2, bi*10);

    // 작은 세부 가지
    if(bi < 4){
      const mx2=(bx+ex)*0.55, my2=(by+ey)*0.55;
      const sx2=mx2+Math.cos(b.angle-Math.PI/2+1.0)*b.len*0.38;
      const sy2=my2+Math.sin(b.angle-Math.PI/2+1.0)*b.len*0.38;
      ctx.lineWidth=b.thick*0.45;
      ctx.beginPath(); ctx.moveTo(mx2,my2); ctx.lineTo(sx2,sy2); ctx.stroke();
      drawLeafCluster(sx2,sy2,clusterSize*0.55, sr2, bi*7+20);
    }
  });

  ctx.restore();
}

function drawLeafCluster(cx2, cy2, radius, sr2, seedOff) {
  const count = 7 + Math.floor(sr2(seedOff)*5);
  for(let i=0;i<count;i++){
    const angle = (i/count)*Math.PI*2 + sr2(seedOff+i)*0.8;
    const dist = radius*(0.25 + sr2(seedOff+i+1)*0.75);
    const lx2 = cx2 + Math.cos(angle)*dist;
    const ly2 = cy2 + Math.sin(angle)*dist;
    const lsize = radius*(0.18 + sr2(seedOff+i+2)*0.20);
    const hue = autumnHues[Math.floor(sr2(seedOff+i+3)*autumnHues.length)];
    const shape = Math.floor(sr2(seedOff+i+4)*3);

    ctx.save();
    ctx.globalAlpha = 0.78 + sr2(seedOff+i+5)*0.18;
    ctx.fillStyle = `hsl(${hue},70%,${42+Math.floor(sr2(seedOff+i+6)*14)}%)`;
    ctx.translate(lx2,ly2);
    ctx.rotate(sr2(seedOff+i+7)*Math.PI*2);
    drawLeafShape(0,0,lsize,shape);
    ctx.restore();
  }
}

function drawAutumnLeaf(p) {
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.globalAlpha=p.a;
  ctx.fillStyle=`hsl(${p.hue},72%,${42+Math.floor(p.a*10)}%)`;
  drawLeafShape(0,0,p.size,p.shape);
  // 잎맥 (살짝)
  ctx.strokeStyle=`hsla(${p.hue},50%,28%,0.28)`;
  ctx.lineWidth=0.7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-p.size*0.7); ctx.lineTo(0,p.size*0.7); ctx.stroke();
  ctx.restore();
}

function updateAutumnLeaf(p) {
  p.swg+=p.swgS;
  p.x+=p.vx+Math.sin(p.swg)*0.6;
  p.y+=p.vy; p.rot+=p.rotV;
  if(p.y > H*0.78 && !p.landing) {
    p.landing = true;
  }
  if(p.landing) {
    p.vy *= 0.88;
    p.vx *= 0.90;
    p.rotV *= 0.90;
    if(p.vy < 0.015) {
      extras.push({
        type:'settled',
        x:p.x, y:p.y,
        rot:p.rot+(Math.random()-0.5)*0.3,
        size:p.size*0.85,
        hue:p.hue, shape:p.shape,
        a:0,
        targetA:p.a*0.82,
      });
      if(extras.filter(e=>e.type==='settled').length>120) {
        const idx=extras.findIndex(e=>e.type==='settled');
        if(idx>-1) extras.splice(idx,1);
      }
      Object.assign(p,makeAutumnLeaf(false));
    }
  }
}

/* ════════════════════════════════════════════
   Main render loop — 원본 그대로
   ════════════════════════════════════════════ */
function loop() {
  t+=0.016;
  ctx.clearRect(0,0,W,H);
  const id=scenes[currentIdx].id;

  if(id==='spring_tree'){
    drawSpringBG();
    // 낙엽은 leaf-canvas에서 독립적으로 처리
  }

  else if(id==='shooting_stars'){
    drawNightBG();
    particles.forEach(p=>{
      p.twk+=p.twkS;
      const alpha=p.a*(0.5+0.5*Math.sin(p.twk));
      ctx.fillStyle=`rgba(255,253,220,${alpha})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    });

    extras=extras.filter(s=>{
      if(s.type!=='shooter') return true;
      s.life++;
      s.x+=s.vx; s.y+=s.vy;
      s.trail.push({x:s.x,y:s.y});
      if(s.trail.length>55) s.trail.shift();

      const prog=s.life/s.maxLife;
      const baseA=prog<0.15?prog/0.15:prog>0.80?(1-prog)/0.20:1;

      ctx.save();
      for(let i=1;i<s.trail.length;i++){
        const ta=i/s.trail.length;
        ctx.globalAlpha=baseA*ta*0.82;
        ctx.strokeStyle='rgba(255,250,195,1)';
        ctx.lineWidth=1.6*ta; ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(s.trail[i-1].x,s.trail[i-1].y);
        ctx.lineTo(s.trail[i].x,s.trail[i].y);
        ctx.stroke();
      }
      ctx.restore();

      ctx.save(); ctx.globalAlpha=baseA*0.92;
      const gw=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,8);
      gw.addColorStop(0,'rgba(255,255,215,1)'); gw.addColorStop(1,'rgba(255,255,200,0)');
      ctx.fillStyle=gw; ctx.beginPath(); ctx.arc(s.x,s.y,8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,235,1)'; ctx.beginPath(); ctx.arc(s.x,s.y,1.8,0,Math.PI*2); ctx.fill();
      ctx.restore();

      if(s.x<-80||s.x>W+80||s.y>H+80||s.y<-80) return false;
      return s.life<s.maxLife;
    });
    if(Math.random()<0.0025) spawnShooter();
  }

  else if(id==='snowfall'){
    drawSnowBG();
    particles.forEach(p=>{
      p.swg+=p.swgS;
      p.x+=p.vx+Math.sin(p.swg)*0.4;
      p.y+=p.vy; p.rot+=0.006;
      if(p.y>H+10) Object.assign(p,makeSnow(false));
      drawSnowflake(p.x,p.y,p.r,p.a,p.rot);
    });
  }

  else if(id==='lake_rain'){
    drawLakeBG();
    const lakeY=H*0.44;

    particles.forEach(p=>{
      if(p.type!=='raindrop') return;
      p.y+=p.vy;
      if(p.y>=lakeY){
        spawnRipple(p.x, lakeY+Math.random()*5);
        Object.assign(p,makeRaindrop(false));
        p.y=-5; return;
      }
      ctx.save(); ctx.globalAlpha=p.a;
      ctx.strokeStyle='rgba(175,208,238,0.88)';
      ctx.lineWidth=p.w; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x,p.y-p.len); ctx.stroke();
      ctx.restore();
    });

    extras=extras.filter(r=>{
      if(r.type!=='ripple') return true;
      r.life++;
      r.r=(r.life/r.maxLife)*r.maxR;
      const lifeRatio = r.life/r.maxLife;
      const fadeIn = Math.min(1, r.life / 8);
      const a = r.a * fadeIn * (1 - lifeRatio);
      ctx.save(); ctx.globalAlpha=a;
      ctx.strokeStyle='rgba(175,205,225,0.85)'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.ellipse(r.x,r.y,r.r,r.r*r.ryRatio,0,0,Math.PI*2); ctx.stroke();
      if(r.maxR>30&&r.r>r.maxR*0.38){
        ctx.globalAlpha=a*0.38;
        ctx.beginPath(); ctx.ellipse(r.x,r.y,r.r*0.52,r.r*r.ryRatio*0.52,0,0,Math.PI*2); ctx.stroke();
      }
      ctx.restore();
      return r.life<r.maxLife;
    });

    if(particles.length<28) particles.push(makeRaindrop(false));
  }

  else if(id==='autumn'){
    drawAutumnBG();
    extras.forEach(e=>{
      if(e.type!=='settled') return;
      if(e.a < e.targetA) e.a = Math.min(e.targetA, e.a + 0.010);
      ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(e.rot); ctx.globalAlpha=e.a;
      ctx.fillStyle=`hsl(${e.hue},68%,40%)`;
      drawLeafShape(0,0,e.size,e.shape);
      ctx.restore();
    });
    if(Math.random()<0.006&&particles.length<20) particles.push(makeAutumnLeaf(false));
    particles.forEach(p=>{ updateAutumnLeaf(p); drawAutumnLeaf(p); });
  }

  animId=requestAnimationFrame(loop);
}

updateUI();
resize();

})();
</script>

<!-- 낙엽 애니메이션 — 하루 감정에서 이식, 봄 나무 테마일 때만 동작 -->
<script>
(function(){
  const canvas = document.getElementById('leaf-canvas');
  const ctx    = canvas.getContext('2d');
  const area   = document.getElementById('app');

  function resize(){
    canvas.width  = area.clientWidth;
    canvas.height = area.clientHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS=['#78c878','#96dc96','#a4e0a4','#b5d99c','#88d288','#6ab86a','#bceabc','#c6eec6'];

  function drawLeaf(x,y,size,angle,alpha,color){
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.ellipse(0,0,size*0.42,size*0.22,0,0,Math.PI*2);
    ctx.fillStyle=color;
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-size*0.38,0); ctx.lineTo(size*0.38,0);
    ctx.strokeStyle='rgba(60,120,60,0.35)';
    ctx.lineWidth=0.7;
    ctx.stroke();
    ctx.restore();
  }

  const MAX_LEAVES=18;
  const MAX_PILE=40;
  let leaves=[];
  let pile=[];

  function spawnLeaf(){
    if(leaves.length>=MAX_LEAVES) return;
    const w=canvas.width, h=canvas.height;
    const x=w*0.10+Math.random()*w*0.80;
    const y=h*0.05+Math.random()*h*0.42;
    leaves.push({
      x, y,
      vx:(Math.random()-0.5)*0.5,
      vy:0.35+Math.random()*0.45,
      angle:Math.random()*Math.PI*2,
      va:(Math.random()-0.5)*0.04,
      swing:Math.random()*Math.PI*2,
      swingSpeed:0.018+Math.random()*0.018,
      swingAmp:0.6+Math.random()*0.9,
      size:7+Math.random()*7,
      alpha:0.55+Math.random()*0.3,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
    });
  }

  let frameCount=0;

  function isSpringScene(){
    return document.getElementById('scene-label').textContent==='봄 나무';
  }

  function animate(){
    if(!isSpringScene()){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      leaves=[]; pile=[];
      requestAnimationFrame(animate);
      return;
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);
    frameCount++;
    if(frameCount%90===0) spawnLeaf();

    const floor=canvas.height-14;
    pile.forEach(p=>drawLeaf(p.x,p.y,p.size,p.angle,p.alpha*0.65,p.color));
    leaves=leaves.filter(l=>{
      l.swing+=l.swingSpeed;
      l.x+=l.vx+Math.sin(l.swing)*l.swingAmp*0.3;
      l.y+=l.vy;
      l.angle+=l.va;
      if(l.y>=floor){
        l.y=floor;
        if(pile.length<MAX_PILE) pile.push({x:l.x,y:l.y,size:l.size,angle:l.angle,alpha:l.alpha,color:l.color});
        return false;
      }
      drawLeaf(l.x,l.y,l.size,l.angle,l.alpha,l.color);
      return true;
    });
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
</body>
