<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="소소한 앱">
<title>소소한 앱</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --sky: #D6ECFA; --white: #FFFFFF;
  --text: #2C4A5A; --text-muted: #5A7A8A; --text-light: #8AAABB;
  --border: rgba(44,74,90,0.15); --border-mid: rgba(44,74,90,0.25);
  --radius: 12px; --radius-sm: 8px;
  --shadow-sm: 0 1px 4px rgba(44,74,90,0.08);
  --imp-low: #B8DDEF; --imp-low-t: #1D5C7A;
  --imp-mid: #FFD580; --imp-mid-t: #7A5200;
  --imp-high: #FFB3B3; --imp-high-t: #7A1A1A;
  --accent: #E8845A;
  --accent-light: #FDE8D8;
  --accent-mid: #F9A870;
  --accent-btn: #C8623C;
  --blue-accent: #1D5C7A;
}
html, body { height: 100%; overflow: hidden; background: var(--sky); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 480px; margin: 0 auto; background: var(--sky); }
.app-header { height: 52px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.app-title { font-size: 18px; font-weight: 700; color: var(--text); }
.tab-content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.tab-bar { height: 64px; display: flex; background: var(--white); border-top: 1px solid var(--border); flex-shrink: 0; }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: transparent; color: var(--text-light); font-size: 11px; font-weight: 500; cursor: pointer; padding: 6px 0; }
.tab-btn.active { color: var(--accent-mid); }
.tab-icon { font-size: 20px; }
.panel { display: none; padding: 0 12px 20px; }
.panel.active { display: block; }

/* WEEK NAV */
.week-nav { display: flex; align-items: center; gap: 8px; padding: 12px 0 8px; }
.week-label { font-size: 13px; font-weight: 600; color: var(--text); text-align: center; flex: 1; }
.nav-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border-mid); background: var(--white); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* DAY TABS: 7칸 균등 */
.day-tabs { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; padding: 0 0 10px; }
.day-tab { padding: 5px 0; border-radius: 10px; border: 1.5px solid var(--border-mid); background: var(--white); color: var(--text-muted); cursor: pointer; text-align: center; transition: all 0.15s; min-width: 0; }
.day-tab.active { background: var(--accent-mid); border-color: var(--accent); color: white; }
.day-tab .dn { font-size: 10px; }
.day-tab .dd { font-size: 13px; font-weight: 700; }
.day-tab.sat .dn, .day-tab.sat .dd { color: #2255AA; }
.day-tab.sun .dn, .day-tab.sun .dd { color: #AA2222; }
.day-tab.active .dn, .day-tab.active .dd { color: white !important; }

/* SECTION HEADER */
.sec-hd { display: flex; align-items: center; justify-content: space-between; padding: 4px 0 8px; }
.sec-title { font-size: 13px; font-weight: 600; color: var(--text-muted); }
.panel-hd { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 10px; }
.panel-title { font-size: 16px; font-weight: 700; color: var(--text); }
.add-btn { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-mid); color: white; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.io-btn { height: 34px; padding: 0 12px; border-radius: 17px; background: var(--white); color: var(--accent-btn); border: 1.5px solid var(--accent-mid); font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 4px; flex-shrink: 0; white-space: nowrap; }
.io-btn-label { font-size: 11px; font-weight: 600; color: var(--accent-btn); }
.panel-hd-right { display: flex; align-items: center; gap: 10px; }

/* ITEM LIST */
.item-list { display: flex; flex-direction: column; gap: 8px; }
.item-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 10px 10px; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-sm); user-select: none; }
.item-card.dragging { opacity: 0.5; }
.item-card.drag-over { border-color: var(--accent-mid); }
.drag-handle { flex-shrink: 0; display: flex; flex-direction: column; gap: 3px; padding: 3px 2px; cursor: grab; }
.drag-handle span { display: block; width: 16px; height: 2px; background: var(--text-light); border-radius: 2px; }
.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.item-actions { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.edit-btn { width: 28px; height: 28px; border-radius: var(--radius-sm); border: 1px solid var(--border-mid); background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.del-btn { width: 28px; height: 28px; border-radius: var(--radius-sm); border: 1px solid #FFB3B3; background: transparent; color: #A83232; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.imp-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 20px; flex-shrink: 0; }
.imp-low { background: var(--imp-low); color: var(--imp-low-t); }
.imp-mid { background: var(--imp-mid); color: var(--imp-mid-t); }
.imp-high { background: var(--imp-high); color: var(--imp-high-t); }
.dday-badge { font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 20px; background: var(--accent-light); color: var(--accent-btn); flex-shrink: 0; min-width: 56px; text-align: center; }
.dday-past { background: #FFF0E6; color: #8A4000; }
.dday-today { background: #E6FFE6; color: #1A6B1A; }
.lunar-tag { font-size: 9px; background: #EEE8FF; color: #5533AA; border-radius: 4px; padding: 1px 4px; margin-left: 3px; font-weight: 600; vertical-align: middle; }
.week-day-block { margin-bottom: 14px; }
.week-day-label { font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 4px 2px 5px; border-bottom: 1.5px solid var(--border-mid); margin-bottom: 7px; display: flex; align-items: center; gap: 5px; }
.week-day-label.is-today { color: var(--accent-mid); border-bottom-color: var(--accent-mid); }
.today-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-mid); display: inline-block; flex-shrink: 0; }
.week-day-empty { font-size: 12px; color: var(--text-light); padding: 3px 2px; }
.week-day-label.is-sat { color: #2255AA; border-bottom-color: #2255AA; }
.week-day-label.is-sun { color: #AA2222; border-bottom-color: #AA2222; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(44,74,90,0.45); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.modal-overlay.hidden { display: none; }
.modal-box { background: var(--white); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 20px 20px 36px; max-height: 85vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 10px 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-mid); background: var(--accent-light); font-size: 14px; color: var(--text); outline: none; font-family: inherit; }
.form-input:focus { border-color: var(--accent); border-color: var(--accent-mid); }
.date-row { display: flex; gap: 6px; align-items: center; }
.date-row .form-input { text-align: center; }
.date-sep { color: var(--text-muted); font-weight: 600; font-size: 15px; flex-shrink: 0; }
.cal-row { display: flex; gap: 8px; margin-bottom: 12px; }
.cal-opt { flex: 1; padding: 9px 0; border-radius: var(--radius-sm); border: 1.5px solid var(--border-mid); background: var(--accent-light); font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; color: var(--text-muted); }
.cal-opt.sel { background: var(--accent-mid); border-color: var(--accent); color: white; }
.imp-row { display: flex; gap: 8px; }
.imp-opt { flex: 1; padding: 8px 0; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--accent-light); font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; color: var(--text-muted); }
.imp-opt.s-low { background: var(--imp-low); border-color: var(--imp-low); color: var(--imp-low-t); }
.imp-opt.s-mid { background: var(--imp-mid); border-color: var(--imp-mid); color: var(--imp-mid-t); }
.imp-opt.s-high { background: var(--imp-high); border-color: var(--imp-high); color: var(--imp-high-t); }
.modal-acts { display: flex; gap: 8px; margin-top: 18px; }
.btn-cancel { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-mid); background: transparent; color: var(--text-muted); font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-save { flex: 2; padding: 13px; border-radius: var(--radius-sm); border: none; background: var(--accent-btn); color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
.empty-msg { text-align: center; padding: 32px 0; color: var(--text-light); font-size: 13px; }
</style>
</head>
<body>
<div id="app">
  <div class="app-header"><span style="display:flex;align-items:center;gap:7px;"><span style="font-size:22px;line-height:1">📅</span><span class="app-title">소소한 앱</span></span></div>
  <div class="tab-content">

    <div class="panel active" id="panel-schedule">
      <div class="week-nav">
        <button class="nav-btn" id="prev-week">‹</button>
        <span class="week-label" id="week-label"></span>
        <button class="nav-btn" id="next-week">›</button>
      </div>
      <div class="day-tabs" id="day-tabs"></div>
      <div class="sec-hd">
        <span class="sec-title" id="day-sec-title">일정 입력: 날짜 선택 후 +</span>
        <button class="add-btn" id="add-sch">+</button>
      </div>
      <div id="sch-week-view"></div>
    </div>

    <div class="panel" id="panel-dday">
      <div class="panel-hd">
        <span class="panel-title">디데이</span>
        <div class="panel-hd-right">
          <button class="io-btn" id="import-dd">📥<span class="io-btn-label">불러오기</span></button>
          <button class="io-btn" id="export-dd">📤<span class="io-btn-label">내보내기</span></button>
          <button class="add-btn" id="add-dd">+</button>
        </div>
      </div>
      <div class="item-list" id="dd-list"></div>
    </div>
    <input type="file" id="file-import-dd" accept=".json" style="display:none">

    <div class="panel" id="panel-anniversary">
      <div class="panel-hd">
        <span class="panel-title">기념일</span>
        <div class="panel-hd-right">
          <button class="io-btn" id="import-an">📥<span class="io-btn-label">불러오기</span></button>
          <button class="io-btn" id="export-an">📤<span class="io-btn-label">내보내기</span></button>
          <button class="add-btn" id="add-an">+</button>
        </div>
      </div>
      <div class="item-list" id="an-list"></div>
    </div>
    <input type="file" id="file-import-an" accept=".json" style="display:none">

  </div>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="schedule"><span class="tab-icon">📅</span><span>다음 주 일정</span></button>
    <button class="tab-btn" data-tab="dday"><span class="tab-icon">⏳</span><span>디데이</span></button>
    <button class="tab-btn" data-tab="anniversary"><span class="tab-icon">🎉</span><span>기념일</span></button>
  </div>
</div>

<div class="modal-overlay hidden" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="m-title">추가</div>
    <div class="form-group">
      <label class="form-label">제목</label>
      <input class="form-input" id="f-name" type="text" placeholder="제목을 입력하세요" />
    </div>
    <div class="form-group" id="g-dday" style="display:none">
      <label class="form-label">날짜</label>
      <div class="date-row">
        <input class="form-input" id="f-y" type="number" placeholder="년" min="1900" max="2100" style="width:76px" inputmode="numeric" />
        <span class="date-sep">년</span>
        <input class="form-input" id="f-mo" type="number" placeholder="월" min="1" max="12" style="width:56px" inputmode="numeric" />
        <span class="date-sep">월</span>
        <input class="form-input" id="f-d" type="number" placeholder="일" min="1" max="31" style="width:56px" inputmode="numeric" />
        <span class="date-sep">일</span>
      </div>
    </div>
    <div class="form-group" id="g-anniv" style="display:none">
      <label class="form-label">날짜 유형</label>
      <div class="cal-row">
        <div class="cal-opt sel" id="cal-solar">양력</div>
        <div class="cal-opt" id="cal-lunar">음력</div>
      </div>
      <label class="form-label">날짜</label>
      <div class="date-row">
        <input class="form-input" id="f-am" type="number" placeholder="월" min="1" max="12" style="width:70px" inputmode="numeric" />
        <span class="date-sep">월</span>
        <input class="form-input" id="f-ad" type="number" placeholder="일" min="1" max="30" style="width:70px" inputmode="numeric" />
        <span class="date-sep">일</span>
      </div>
    </div>
    <div class="form-group" id="g-imp" style="display:none">
      <label class="form-label">중요도</label>
      <div class="imp-row" id="imp-row">
        <div class="imp-opt" data-v="low">낮음</div>
        <div class="imp-opt s-mid" data-v="mid">보통</div>
        <div class="imp-opt" data-v="high">높음</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">메모 <span style="color:var(--text-light);font-weight:400">(선택)</span></label>
      <input class="form-input" id="f-memo" type="text" placeholder="간단한 메모" />
    </div>
    <div class="modal-acts">
      <button class="btn-cancel" id="m-cancel">취소</button>
      <button class="btn-save" id="m-save">저장</button>
    </div>
  </div>
</div>

<script>
// ── 음력→양력 변환 (1900~2050) ─────────────────────────────────────────
const LI=[0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0,0x0b550,0x15355,0x04da0,0x0a5d0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06aa0,0x0a6b6,0x056a0,0x02b60,0x09373,0x092e0,0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0f930,0x0aa70,0x0a9b8,0x0aad0,0x17095,0x04bd0,0x096d0,0x0d4d4,0x0d130,0x0d950,0x156d5,0x055a0,0x0aba0,0x1a5b3,0x04b60,0x0aa60,0x0aa55,0x0a570,0x05260,0x0f265,0x0d520,0x0daa0,0x16aa6,0x056d0,0x04ae0,0x0a9d4,0x0a2d0,0x0d150,0x0f252,0x0d520];
function lLeap(y){return LI[y-1900]&0xf;}
function lLeapDays(y){if(lLeap(y))return(LI[y-1900]&0x10000)?30:29;return 0;}
function lMonthDays(y,m){return(LI[y-1900]&(0x10000>>m))?30:29;}
function lYearDays(y){let s=348;for(let i=0x8000;i>0x8;i>>=1)s+=(LI[y-1900]&i)?1:0;return s+lLeapDays(y);}
function lunarToSolar(ly,lm,ld){
  let offset=0;
  for(let i=1900;i<ly;i++)offset+=lYearDays(i);
  for(let i=1;i<lm;i++)offset+=lMonthDays(ly,i);
  offset+=ld-1;
  const base=new Date(1900,0,31);
  base.setDate(base.getDate()+offset);
  return base;
}
function lunarMDtoSolar(lm,ld){
  const now=new Date();now.setHours(0,0,0,0);
  const curY=now.getFullYear();
  const cands=[];
  for(let y=curY-1;y<=curY+1;y++){
    try{const d=lunarToSolar(y,lm,ld);d.setHours(0,0,0,0);cands.push(d);}catch(e){}
  }
  const future=cands.filter(d=>d>=now);
  if(future.length)return future.reduce((a,b)=>a<b?a:b);
  return cands.reduce((a,b)=>a>b?a:b);
}

// ── UTILS ─────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const DAY=['일','월','화','수','목','금','토'];
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dayDiff(ds){return Math.round((new Date(ds+'T00:00:00')-today0())/86400000);}
function annivLeft(it){
  const now=today0();
  let dt;
  if(it.lunar){dt=lunarMDtoSolar(it.month,it.day);}
  else{const y=now.getFullYear();dt=new Date(y,it.month-1,it.day);if(dt<now)dt=new Date(y+1,it.month-1,it.day);}
  return Math.round((dt-now)/86400000);
}

// ── STATE ─────────────────────────────────────────────────────────────
let S={weekOffset:1,selDay:null,sch:[],dd:[],an:[]};
function load(){
  try{S.sch=JSON.parse(localStorage.getItem('ss_sch')||'[]');}catch(e){S.sch=[];}
  try{S.dd=JSON.parse(localStorage.getItem('ss_dd')||'[]');}catch(e){S.dd=[];}
  try{S.an=JSON.parse(localStorage.getItem('ss_an')||'[]');}catch(e){S.an=[];}
}
function save(){
  localStorage.setItem('ss_sch',JSON.stringify(S.sch));
  localStorage.setItem('ss_dd',JSON.stringify(S.dd));
  localStorage.setItem('ss_an',JSON.stringify(S.an));
}

// ── WEEK ──────────────────────────────────────────────────────────────
function weekDates(off){
  const now=new Date();
  const mon=new Date(now);
  mon.setDate(now.getDate()-now.getDay()+1+off*7);
  mon.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function renderWeek(){
  const dates=weekDates(S.weekOffset);
  const s=dates[0],e=dates[6];
  $('week-label').textContent=`${s.getMonth()+1}/${s.getDate()} ~ ${e.getMonth()+1}/${e.getDate()}`;
  if(!S.selDay||!dates.find(d=>fmt(d)===S.selDay))S.selDay=fmt(dates[0]);
  const tabs=$('day-tabs');tabs.innerHTML='';
  dates.forEach(d=>{
    const key=fmt(d),dow=d.getDay();
    const el=document.createElement('div');
    let cls='day-tab'+(key===S.selDay?' active':'')+(dow===6?' sat':'')+(dow===0?' sun':'');
    el.className=cls;
    el.innerHTML=`<div class="dn">${DAY[dow]}</div><div class="dd">${d.getDate()}</div>`;
    el.onclick=()=>{S.selDay=key;renderWeek();renderSch();};
    tabs.appendChild(el);
  });
  const sd=new Date(S.selDay+'T00:00:00');
  $('day-sec-title').textContent=`선택된 날짜: ${sd.getMonth()+1}/${sd.getDate()} (${DAY[sd.getDay()]}) 에 추가`;
}

// ── RENDER LISTS ──────────────────────────────────────────────────────
function renderSch(){
  const container=$('sch-week-view');
  container.innerHTML='';
  const dates=weekDates(S.weekOffset);
  const todayStr=fmt(today0());
  let hasAny=false;
  dates.forEach(d=>{
    const key=fmt(d),dow=d.getDay();
    const items=S.sch.filter(x=>x.date===key);
    const block=document.createElement('div');block.className='week-day-block';
    const lbl=document.createElement('div');
    const isSat=dow===6,isSun=dow===0;
    lbl.className='week-day-label'+(key===todayStr?' is-today':'')+(isSat?' is-sat':'')+(isSun?' is-sun':'');
    if(key===todayStr){const dot=document.createElement('span');dot.className='today-dot';lbl.appendChild(dot);}
    const dayNames=['일','월','화','수','목','금','토'];
    lbl.appendChild(document.createTextNode(`${d.getMonth()+1}월 ${d.getDate()}일 (${dayNames[dow]})`));
    block.appendChild(lbl);
    if(!items.length){
      const em=document.createElement('div');em.className='week-day-empty';em.textContent='일정 없음';
      block.appendChild(em);
    }else{
      hasAny=true;
      const ilist=document.createElement('div');ilist.className='item-list';ilist.style.marginBottom='4px';
      items.forEach((it,i)=>ilist.appendChild(makeCard(it,i,'sch')));
      setupDrag(ilist,S.sch,'sch');
      block.appendChild(ilist);
    }
    container.appendChild(block);
  });
}
function renderDd(){
  const list=$('dd-list');list.innerHTML='';
  const sorted=[...S.dd].sort((a,b)=>(b.id||0)-(a.id||0));
  if(!sorted.length){list.innerHTML='<div class="empty-msg">디데이를 추가해보세요</div>';return;}
  sorted.forEach((it,i)=>list.appendChild(makeCard(it,i,'dd')));
}
function renderAn(){
  const list=$('an-list');list.innerHTML='';
  const sorted=[...S.an].sort((a,b)=>annivLeft(a)-annivLeft(b));
  if(!sorted.length){list.innerHTML='<div class="empty-msg">기념일을 추가해보세요</div>';return;}
  sorted.forEach((it,i)=>list.appendChild(makeCard(it,i,'an')));
}

function ddText(it,type){
  if(type==='dd'){
    const diff=dayDiff(it.date);
    if(diff===0)return{t:'D-DAY',c:'dday-today'};
    if(diff<0)return{t:`+${Math.abs(diff)}일`,c:'dday-past'};
    return{t:`D-${diff}`,c:''};
  }else{
    const left=annivLeft(it);
    if(left===0)return{t:'D-DAY',c:'dday-today'};
    return{t:`-${left}일`,c:''};
  }
}

function makeCard(it,idx,type){
  const card=document.createElement('div');
  card.className='item-card';
  card.dataset.idx=idx;
  card.draggable=type==='sch';

  if(type==='sch'){
    const h=document.createElement('div');
    h.className='drag-handle';
    h.innerHTML='<span></span><span></span><span></span>';
    card.appendChild(h);
  }

  const body=document.createElement('div');body.className='item-body';
  const nameEl=document.createElement('div');nameEl.className='item-name';
  nameEl.textContent=it.name;
  if(type==='an'&&it.lunar){
    const tag=document.createElement('span');tag.className='lunar-tag';tag.textContent='음력';
    nameEl.appendChild(tag);
  }
  body.appendChild(nameEl);
  if(it.memo){const m=document.createElement('div');m.className='item-meta';m.textContent=it.memo;body.appendChild(m);}
  if(type==='an'){const m=document.createElement('div');m.className='item-meta';m.textContent=`${it.month}월 ${it.day}일`;body.appendChild(m);}
  if(type==='dd'){const m=document.createElement('div');m.className='item-meta';m.textContent=it.date.replace(/-/g,'. ')+'.';;body.appendChild(m);}

  const acts=document.createElement('div');acts.className='item-actions';
  if(type==='sch'){
    const b=document.createElement('span');
    b.className=`imp-badge imp-${it.importance||'mid'}`;
    b.textContent=it.importance==='low'?'낮음':it.importance==='high'?'높음':'보통';
    acts.appendChild(b);
  }else{
    const inf=ddText(it,type);
    const b=document.createElement('span');b.className=`dday-badge ${inf.c}`;b.textContent=inf.t;
    acts.appendChild(b);
  }
  const eb=document.createElement('button');eb.className='edit-btn';eb.textContent='✏️';
  eb.onclick=()=>{
    const arr=type==='sch'?S.sch:type==='dd'?S.dd:S.an;
    const oi=arr.findIndex(x=>x.id===it.id);
    openModal(type,it,oi);
  };
  const db=document.createElement('button');db.className='del-btn';db.textContent='✕';
  db.onclick=()=>delItem(type,it.id);
  acts.appendChild(eb);acts.appendChild(db);
  card.appendChild(body);card.appendChild(acts);
  return card;
}

// ── DRAG (일정만) ─────────────────────────────────────────────────────
function setupDrag(container,arr,type){
  let di=null;
  container.querySelectorAll('.item-card').forEach(card=>{
    card.addEventListener('dragstart',e=>{di=+card.dataset.idx;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));
    card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();card.classList.remove('drag-over');
      const ddi=+card.dataset.idx;if(di===null||di===ddi)return;
      const fil=arr.filter(x=>x.date===S.selDay),oth=arr.filter(x=>x.date!==S.selDay);
      const[mv]=fil.splice(di,1);fil.splice(ddi,0,mv);
      S.sch=[...oth,...fil];di=null;save();renderAll();
    });
    let tc=null,tcl=null,tsy=0,tdi=null;
    card.addEventListener('touchstart',e=>{
      if(!e.target.closest('.drag-handle'))return;
      tdi=+card.dataset.idx;tsy=e.touches[0].clientY;
      tcl=card.cloneNode(true);
      const r=card.getBoundingClientRect();
      tcl.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;opacity:.7;z-index:999;pointer-events:none;`;
      document.body.appendChild(tcl);card.style.opacity='.3';tc=card;
    },{passive:true});
    card.addEventListener('touchmove',e=>{
      if(!tcl)return;
      tcl.style.top=(card.getBoundingClientRect().top+(e.touches[0].clientY-tsy))+'px';
    },{passive:true});
    card.addEventListener('touchend',e=>{
      if(!tcl)return;tcl.remove();tcl=null;card.style.opacity='';
      const el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
      const dc=el?.closest('.item-card');
      if(dc&&dc!==card){
        const ddi=+dc.dataset.idx;
        const fil=arr.filter(x=>x.date===S.selDay),oth=arr.filter(x=>x.date!==S.selDay);
        const[mv]=fil.splice(tdi,1);fil.splice(ddi,0,mv);
        S.sch=[...oth,...fil];save();renderAll();
      }
      tc=null;tdi=null;
    });
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────
let mCtx={type:null,item:null,idx:null},selImp='mid',selCal='solar';

function openModal(type,item,idx){
  mCtx={type,item,idx};
  const isE=item!==null;
  $('m-title').textContent=isE?'수정':(type==='sch'?'일정 추가':type==='dd'?'디데이 추가':'기념일 추가');
  $('f-name').value=isE?item.name:'';
  $('f-memo').value=isE?(item.memo||''):'';
  $('g-dday').style.display=type==='dd'?'':'none';
  $('g-anniv').style.display=type==='an'?'':'none';
  $('g-imp').style.display=type==='sch'?'':'none';
  if(type==='dd'){
    if(isE&&item.date){const[y,m,d]=item.date.split('-');$('f-y').value=+y;$('f-mo').value=+m;$('f-d').value=+d;}
    else{$('f-y').value='';$('f-mo').value='';$('f-d').value='';}
  }
  if(type==='an'){
    selCal=isE?(item.lunar?'lunar':'solar'):'solar';
    updCal();
    $('f-am').value=isE?item.month:'';
    $('f-ad').value=isE?item.day:'';
  }
  if(type==='sch'){selImp=isE&&item.importance?item.importance:'mid';updImp();}
  $('modal').classList.remove('hidden');
  setTimeout(()=>$('f-name').focus(),100);
}
function updImp(){
  document.querySelectorAll('#imp-row .imp-opt').forEach(o=>{
    o.className='imp-opt';
    if(o.dataset.v===selImp)o.classList.add(`s-${selImp}`);
  });
}
function updCal(){
  $('cal-solar').className='cal-opt'+(selCal==='solar'?' sel':'');
  $('cal-lunar').className='cal-opt'+(selCal==='lunar'?' sel':'');
}
document.querySelectorAll('#imp-row .imp-opt').forEach(o=>o.onclick=()=>{selImp=o.dataset.v;updImp();});
$('cal-solar').onclick=()=>{selCal='solar';updCal();};
$('cal-lunar').onclick=()=>{selCal='lunar';updCal();};
$('m-cancel').onclick=()=>$('modal').classList.add('hidden');
$('modal').onclick=e=>{if(e.target===$('modal'))$('modal').classList.add('hidden');};
$('m-save').onclick=()=>{
  const name=$('f-name').value.trim();
  if(!name){$('f-name').focus();return;}
  const{type,item,idx}=mCtx;
  const obj={id:item?.id||Date.now(),name,memo:$('f-memo').value.trim()};
  if(type==='sch'){
    obj.date=S.selDay;obj.importance=selImp;
    if(idx!==null&&idx>=0)S.sch[idx]=obj;else S.sch.push(obj);
  }else if(type==='dd'){
    const y=String($('f-y').value||'').padStart(4,'0');
    const m=String($('f-mo').value||'').padStart(2,'0');
    const d=String($('f-d').value||'').padStart(2,'0');
    if(!$('f-y').value||!$('f-mo').value||!$('f-d').value){alert('날짜를 입력해주세요');return;}
    obj.date=`${y}-${m}-${d}`;
    if(idx!==null&&idx>=0)S.dd[idx]=obj;else S.dd.push(obj);
  }else{
    const mon=+$('f-am').value,day=+$('f-ad').value;
    if(!mon||!day){alert('월과 일을 입력해주세요');return;}
    obj.month=mon;obj.day=day;obj.lunar=selCal==='lunar';
    if(idx!==null&&idx>=0)S.an[idx]=obj;else S.an.push(obj);
  }
  save();renderAll();$('modal').classList.add('hidden');
};
function delItem(type,id){
  if(!confirm('삭제할까요?'))return;
  if(type==='sch')S.sch=S.sch.filter(x=>x.id!==id);
  else if(type==='dd')S.dd=S.dd.filter(x=>x.id!==id);
  else S.an=S.an.filter(x=>x.id!==id);
  save();renderAll();
}

// ── TABS ──────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    $(`panel-${btn.dataset.tab}`).classList.add('active');
  };
});
$('prev-week').onclick=()=>{S.weekOffset--;S.selDay=null;renderAll();};
$('next-week').onclick=()=>{S.weekOffset++;S.selDay=null;renderAll();};
$('add-sch').onclick=()=>openModal('sch',null,null);
$('add-dd').onclick=()=>openModal('dd',null,null);
$('add-an').onclick=()=>openModal('an',null,null);


// ── 내보내기 / 불러오기 ───────────────────────────────────────────────
function exportData(type) {
  const data = type === 'dd' ? S.dd : S.an;
  const label = type === 'dd' ? 'dday' : 'anniversary';
  const date = new Date();
  const ds = `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}`;
  const filename = `soso_${label}_${ds}.json`;
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(type, file) {
  if (!file) return;
  const fname = file.name.toLowerCase();
  // 파일명으로 타입 검증
  if (type === 'dd') {
    if (fname.includes('anniversary')) {
      alert('형식이 다릅니다. 디데이 파일을 선택해주세요.\n(파일명에 dday가 포함된 파일)');
      return;
    }
    if (!fname.includes('dday') && !fname.includes('diday')) {
      // 파일명 검증이 모호한 경우 내용으로 2차 확인 - 일단 진행하되 경고
    }
  } else {
    if (fname.includes('dday') || fname.includes('diday')) {
      alert('형식이 다릅니다. 기념일 파일을 선택해주세요.\n(파일명에 anniversary가 포함된 파일)');
      return;
    }
    if (!fname.includes('anniversary')) {
      // 파일명 검증이 모호한 경우 내용으로 2차 확인 - 일단 진행
    }
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) { alert('올바른 파일이 아니에요.'); return; }
      // 내용 기반 2차 검증
      if (type === 'dd') {
        const hasAnnivFields = data.length > 0 && data[0].month !== undefined;
        if (hasAnnivFields) {
          alert('형식이 다릅니다. 디데이 파일을 선택해주세요.');
          return;
        }
        if (confirm(`디데이 ${data.length}개를 불러올까요?\n기존 데이터는 덮어씌워져요.`)) {
          S.dd = data;
          save();
          renderAll();
          alert('불러오기 완료!');
        }
      } else {
        const hasDdayFields = data.length > 0 && data[0].date !== undefined && data[0].month === undefined;
        if (hasDdayFields) {
          alert('형식이 다릅니다. 기념일 파일을 선택해주세요.');
          return;
        }
        if (confirm(`기념일 ${data.length}개를 불러올까요?\n기존 데이터는 덮어씌워져요.`)) {
          S.an = data;
          save();
          renderAll();
          alert('불러오기 완료!');
        }
      }
    } catch(err) {
      alert('파일을 읽을 수 없어요. JSON 파일인지 확인해주세요.');
    }
  };
  reader.readAsText(file);
}

$('export-dd').onclick = () => exportData('dd');
$('export-an').onclick = () => exportData('an');
$('import-dd').onclick = () => $('file-import-dd').click();
$('import-an').onclick = () => $('file-import-an').click();
$('file-import-dd').onchange = e => { importData('dd', e.target.files[0]); e.target.value=''; };
$('file-import-an').onchange = e => { importData('an', e.target.files[0]); e.target.value=''; };

function renderAll(){renderWeek();renderSch();renderDd();renderAn();}
load();renderAll();
</script>
